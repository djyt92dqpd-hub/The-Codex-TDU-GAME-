function pickRaceHorses(){
  var pool=HORSE_NAME_POOL.slice();
  // Shuffle pool
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  var names=pool.slice(0,6);
  var cols=HORSE_COLOURS.slice();
  for(var i=cols.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cols[i];cols[i]=cols[j];cols[j]=t;}
  // Shuffle odds but keep the set [2,4,6,9,14,20]
  var odds=HORSE_ODDS.slice();
  for(var i=odds.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=odds[i];odds[i]=odds[j];odds[j]=t;}
  return names.map(function(n,i){return{name:n,colour:cols[i],odds:odds[i]};});
}

function hippoStart(){
  var ws=document.getElementById("hipp-wager");
  var wager=ws?parseInt(ws.value)||100:window._hipp.wager||100;
  wager=Math.max(10,Math.min(2000,Math.min(G.gold,wager)));
  if(G.gold<wager){toast("Not enough gold.");return;}
  if(window._hipp.pick<0){toast("Select a horse.");return;}
  G.gold-=wager;saveG();tableUpdateGold();

  var horses=window._hipp.horses;
  var positions=horses.map(function(){return 0;});

  window._hipp.phase="racing";
  window._hipp.positions=positions;
  window._hipp.wager=wager;
  window._hipp.winner=-1;
  renderHippodrome();

  // KEY FIX: near-equal base speeds, large random variance
  // Favourite (2/1) should win ~35% of the time, longshot (20/1) ~4%
  // Formula: step = flat_base + tiny_odds_nudge + large_random
  // All horses average nearly the same speed; favourite just has a tiny edge
  var ticks=0;
  if(window._hippInterval)clearInterval(window._hippInterval);
  window._hippInterval=setInterval(function(){
    // Stop if user navigated away
    if(!document.getElementById("s-table")||!document.getElementById("s-table").classList.contains("active")){
      clearInterval(window._hippInterval);
      if(window._hipp)window._hipp.phase="done";
      return;
    }
    ticks++;
    var done=false;
    for(var i=0;i<horses.length;i++){
      // Each horse gets: flat base + tiny edge from odds + LARGE random burst
      // Favourite (2/1) edge: ~0.08. Longshot (20/1): ~0. Random: 0–4.0
      // So random dominates completely — any horse can win on any given tick
      var oddsEdge=0.08*(1-(horses[i].odds-2)/20); // max 0.08 for favourite, 0 for 20/1
      var step=0.3+oddsEdge+Math.random()*4.0;
      positions[i]=Math.min(100,positions[i]+step);
      var el=document.getElementById("horse-"+i);
      if(el)el.style.left=Math.min(94,positions[i]*0.94)+'%';
      if(positions[i]>=100&&window._hipp.winner<0){
        window._hipp.winner=i;
        done=true;
      }
    }
    window._hipp.positions=positions;

    if(done||ticks>400){
      clearInterval(window._hippInterval);
      if(window._hipp.winner<0){
        var maxPos=0,winner=0;
        for(var i=0;i<horses.length;i++){if(positions[i]>maxPos){maxPos=positions[i];winner=i;}}
        window._hipp.winner=winner;
      }
      window._hipp.phase="done";
      var won=window._hipp.winner===window._hipp.pick;
      if(won){
        var payout=Math.round(wager*horses[window._hipp.winner].odds);
        G.gold+=applyGamblingBonus(payout)+wager;
        saveG();tableUpdateGold();
      }
      setTimeout(renderHippodrome,400);
    }
  },180); // 180ms per tick — noticeably slow, dramatic
}

    '<button class="btn" onclick="renderBasement();goTo(\'s-basement\')">← Basement</button>'+
  '</div>'+
  '<div class="container">'+
    '<div style="font-size:.62rem;letter-spacing:.2em;color:var(--ink-dim);margin-bottom:.3rem">WHEATLAND\'S TRAINING PROTOCOLS</div>'+
    '<h1>Training Mode</h1>'+
    '<p class="lore" style="margin-bottom:1.25rem">"I built these drills into the machine separately — no memory architecture, just pattern work. Faster than a full sync. Use them to prepare before entering a memory, or just to grind."</p>'+
    '<div style="font-size:.65rem;letter-spacing:.15em;color:var(--ink-dim);margin-bottom:.65rem">SELECT A TOPIC</div>';
  REGIONS.forEach(function(r){
    r.topics.forEach(function(code){
      var name=TOPIC_NAMES[code]||code;
      var m=masteredInTopic(code),t=defsForTopic(code).length;
      var pct=t>0?Math.round(m/t*100):0;
      html+='<div class="card card-clickable" onclick="G._currentRegion='+r.id+';G._currentTopic=\''+code+'\';enterSublocation(\''+code+'\')" '+
        'style="padding:.7rem 1rem;margin-bottom:.5rem">'+
        '<div class="row-between">'+
          '<div>'+
            '<div style="font-size:.9rem;color:var(--gold)">'+escapeHtml(name)+'</div>'+
            '<div class="subtle" style="font-size:.7rem">'+escapeHtml(r.name)+' · '+code+'</div>'+
          '</div>'+
          '<span class="mastery-pill">'+m+'/'+t+'</span>'+
        '</div>'+
        '<div class="bar" style="margin-top:.35rem"><div class="bar-fill" style="width:'+pct+'%"></div></div>'+
      '</div>';
    });
  });
  html+='</div>';
  $("s-sublocation").innerHTML=html;
}

var MISSION_STATE={regionId:null,beatIdx:0,gold:0,inspecting:false};

// Per-mission briefing: why THIS memory, what you're hoping to find
var MISSION_BRIEFINGS={
  0:{
    wheatlandNote:"I kept returning to the Babylon memory because of the timing. The sabotage at the Gardens was technically sophisticated -- whoever altered those counterweights understood density and moments precisely. That level of precision, in 600 BCE, applied to cause harm: this is the earliest instance I found of someone using exact physical knowledge as a weapon.\n\nNabu-sharra-usur was the one who noticed. His instinct -- that this was too precise to be accidental -- is what I want you to experience. When you synchronise with him, you're not just learning mechanics. You're learning how to read deliberate precision in a physical system.\n\nThere's also something in the rubble. Something that doesn't belong. -- W.",
    sync:"Synchronising with Nabu-sharra-usur, Royal Engineer. Babylon, 600 BCE. You will experience his investigation into what appears to be a structural failure but may be something else entirely."
  },
  1:{
    wheatlandNote:"The Athens memory almost broke me, actually. Not because of the debate -- because of what Theron found afterwards. A scroll full of almost-correct definitions. Close enough to teach. Wrong enough to mislead.\n\nI spent a year trying to understand who would go to that trouble. Wrong on purpose is much harder than wrong by accident. You have to know the right answer to construct a convincing wrong one.\n\nWhen you synchronise with Theron, pay attention to the visiting scholar. Watch how he argues. The structure of a deliberate error is different from a mistake. -- W.",
    sync:"Synchronising with Theron, student of Aristotle. Athens, 335 BCE. You will experience a public philosophical debate in which something is being deliberately contested."
  },
  2:{
    wheatlandNote:"Clara Marsh's memory is the one that made me feel the most ashamed, if I'm honest. She had the evidence. She had the calculations. She was right. And she still had to fight every step of the way to be believed.\n\nThe physics here isn't the interesting part -- you know ideal gas law. What I want you to feel is what it's like when the correct answer isn't sufficient. When being right isn't enough.\n\nThere's also something inside the boiler housing that shouldn't be there. I found a record of it. It's the same mark I've found elsewhere. -- W.",
    sync:"Synchronising with Clara Marsh, Mill Engineer. Manchester, 1848. You will experience the hours before a potential industrial catastrophe, and what it cost to prevent it."
  },
  3:{
    wheatlandNote:"Edwin Farr's memory is where I first found the initials A.V. I almost missed them -- they're buried in a fault archive from 1871, eighteen years before Farr's own story. Someone else had been in that junction box before. Someone who knew exactly what to look for.\n\nFarr himself is the kind of engineer I admire. Precise, systematic, correct under pressure. His memory is one of the clearest in the machine. When you're in it, you'll feel what it's like to work with a mind that doesn't panic.\n\nThe mystery isn't who sabotaged the cable. The mystery is who signed that 1871 record. -- W.",
    sync:"Synchronising with Edwin Farr, Post Office Cable Engineer. London, 1887. You will experience the hours between a cable failure and a 6am deadline."
  },
  4:{
    wheatlandNote:"The Edo memory disturbed me more than any of the others, in some ways. Because the sabotage here was exquisite. Whoever made that blade brittle understood materials at a level that rivals modern materials science.\n\nTakeda is trying to prove the blade was tampered with. He's fighting for his life. The physics he uses -- stress, strain, fracture modes -- isn't abstract to him. It's the difference between execution and exoneration.\n\nThe tool marks on the tang are the thing. I've seen that pattern before. In a Dutch trading house's records from 1698. -- W.",
    sync:"Synchronising with Takeda Munen, Master Swordsmith. Edo Fortress, Japan, 1703. You will experience a forensic examination conducted under threat of death."
  },
  5:{
    wheatlandNote:"Zahra al-Falaki's memory is the most beautiful and the most frightening. Beautiful because her mind is extraordinary -- she understood field theory and radiation four centuries before the equations were formalised. Frightening because someone tried to use her instruments as a murder weapon.\n\nThe bronze collectors at Isfahan could focus solar radiation to a point. The physics is identical to what we use in concentrated solar power today. Zahra understood it precisely. Whoever adjusted her instruments understood it just as precisely.\n\nThe phrase 'the correction continues' appears in the adjustment log. I've been trying to understand what it means ever since. -- W.",
    sync:"Synchronising with Zahra al-Falaki, Court Astronomer. Isfahan, Persia, 1090 CE. You will experience the night before a solar event that was meant to be an assassination."
  },
  6:{
    wheatlandNote:"The Florence memory is the one where the Voss signature first appears as a name rather than a mark. 'V., Firenze, 1487.' Written on a technical manuscript that describes optical theory that shouldn't have been possible for another century.\n\nLuca Ferrante is trying to prove his work was stolen. He's right -- it was. But the substitution was more sophisticated than simple theft. Someone needed the telescope to produce slightly wrong results. Wrong in a specific, calculated way.\n\nWhy would you want a telescope that shows Jupiter's moons in the wrong positions? I've been thinking about that for three years. I still don't have a satisfying answer. -- W.",
    sync:"Synchronising with Luca Ferrante, Lens-grinder's Apprentice. Florence, 1490. You will experience the discovery of a forgery and the forensic examination of light."
  },
  7:{
    wheatlandNote:"Nefertari's memory is the oldest in the machine. 1280 BCE. The hypostyle hall at Karnak is one of the most acoustically sophisticated structures ever built -- the spacing of those columns produces interference patterns that concentrate sound at specific points. That's not accident. That's physics.\n\nSomeone moved the columns. A Syrian merchant, on a pass with the name 'Voss' on it. He was in Egypt in 1280 BCE, adjusting an ancient acoustic system with the same mark I've found in Babylon and Manchester and Cambridge.\n\nWhen you're in Nefertari's memory, you'll feel what it's like to understand waves not as equations but as a living presence in stone. -- W.",
    sync:"Synchronising with Nefertari, Wave-priest of Amun. Temple at Karnak, Egypt, 1280 BCE. You will experience the hours before a sacred acoustic ritual, and the discovery that someone has tampered with its architecture."
  },
  8:{
    wheatlandNote:"James Colton's memory is the one that finally convinced me this wasn't coincidence. The visitor log for the Cavendish Laboratory, 1932: 'A. Voss, independent researcher, visiting from the continent.' Rutherford signed him in personally.\n\nThe sample was tampered with. The decay constant shifted by 12.3%. Exactly the kind of error that compounds -- that gets cited, taught, propagated. A small wrong number, introduced at the right moment, working its way into the literature.\n\nColton noticed. He was right to notice. He just didn't know what he was looking at. I think I do. -- W.",
    sync:"Synchronising with James Colton, Rutherford's Assistant. The Cavendish Laboratory, Cambridge, 1932. You will experience the discovery that an experiment's results have been deliberately altered."
  },
  9:{
    wheatlandNote:"The Arena memory is actually two memories -- Demarios at Olympia, 420 BCE, and Marcus Ferro at Rome, 80 CE. I include them both because of an anomaly the machine flagged when I accessed them together.\n\nThe same biometric signature appears in both. Not a coincidence, not a glitch -- the same person, 500 years apart, watching sporting events with identical attention. The machine has never flagged this before or since.\n\nDemarios and Marcus are both using physics to detect cheating. The physics of spinning things, of angular momentum, of how bodies move when they're supposed to move differently. It's honest physics, both times. The anomaly is in what they observed at the margins. -- W.",
    sync:"Synchronising with Demarios, Athlete of Olympia. Olympia, 420 BCE. You will experience the hours before the Olympiad, and the detection of a physical irregularity in the competition."
  }
};

function startMission(regionId){
  // Always restore physics DEFS before a mission
  if(window._PHYSICS_DEFS)DEFS=window._PHYSICS_DEFS;
  window._formularyDrillActive=false;
  var m=MISSIONS[regionId];
  if(!m||m.stub){toast("This mission isn't written yet.");return;}
  MISSION_STATE={regionId:regionId,beatIdx:0,gold:0,inspecting:false};
  renderMissionBriefing(regionId);
  goTo("s-mission");
}

function renderMissionBriefing(regionId){
  var m=MISSIONS[regionId];
  var r=REGIONS[regionId];
  var b=MISSION_BRIEFINGS[regionId]||{};
  var html='<div class="topbar">'+
    '<button class="btn" onclick="renderRegion('+regionId+');goTo(\'s-region\')">← '+escapeHtml(r.name)+'</button>'+
  '</div>'+
  '<div class="container">'+
    '<div style="font-size:.62rem;letter-spacing:.2em;color:var(--rg-accent);margin-bottom:.3rem">MISSION BRIEFING</div>'+
    '<h1 style="margin-bottom:.25rem">'+escapeHtml(m.title)+'</h1>'+
    '<div style="font-size:.8rem;color:var(--ink-dim);margin-bottom:1.5rem;font-style:italic">Playing as: '+escapeHtml(m.ancestor)+'</div>';

  if(b.wheatlandNote){
    html+='<div style="background:#1a1408;border:1px dashed #6a5028;border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:1.25rem">'+
      '<div style="font-size:.6rem;letter-spacing:.15em;color:#9c7a40;margin-bottom:.5rem">WHEATLAND\'S NOTES — on this memory</div>'+
      '<div style="color:#c8a870;font-size:.88rem;line-height:1.85;white-space:pre-wrap;font-family:Georgia,serif;font-style:italic">'+escapeHtml(b.wheatlandNote)+'</div>'+
    '</div>';
  }

  if(b.sync){
    html+='<div style="background:var(--bg1);border:1px solid var(--bg4);border-radius:var(--r);padding:.85rem 1rem;margin-bottom:1.5rem">'+
      '<div style="font-size:.62rem;letter-spacing:.15em;color:var(--rg-accent);margin-bottom:.35rem">SYNCHRONISATION INITIALISING</div>'+
      '<div style="font-size:.85rem;color:var(--ink-dim);font-style:italic;line-height:1.7">'+escapeHtml(b.sync)+'</div>'+
    '</div>';
  }

  html+='<button class="btn btn-full btn-accent" style="padding:1rem;font-size:1rem" onclick="renderMissionBeat()">'+
    'Begin synchronisation →'+
  '</button>'+
  '</div>';
  $("s-mission").innerHTML=html;
}

function renderMissionBeat(){
  var rid=MISSION_STATE.regionId;
  var m=MISSIONS[rid];
  var r=REGIONS[rid];
  var beatIdx=MISSION_STATE.beatIdx;

  // Past all beats — go to closing scene
  if(beatIdx>=m.beats.length){
    renderMissionClose();return;
  }

  var beat=m.beats[beatIdx];
  var html='<div class="topbar">'+
    '<button class="btn" onclick="if(confirm(\'Leave mission? Progress will be lost.\'))leaveRegion()">✕ Abandon</button>'+
    '<div class="subtle" style="font-family:monospace;font-size:.72rem">'+escapeHtml(m.ancestor)+'</div>'+
    '<div class="hud"><div class="hud-stat"><span>+g</span><span class="hud-val">'+MISSION_STATE.gold+'</span></div></div>'+
  '</div>'+
  '<div class="container">';

  if(beat.type==="scene"){
    html+=renderMissionScene(beat,rid);
  } else if(beat.type==="question"){
    html+=renderMissionQuestion(beat,rid);
  } else if(beat.type==="inspect"){
    html+=renderMissionInspectPrompt(beat,rid);
  } else if(beat.type==="debate"){
    html+=renderMissionDebate(beat,rid);
  }

  html+='</div>';
  $("s-mission").innerHTML=html;
}

function renderMissionScene(beat,rid){
  var r=REGIONS[rid];
  var html='';
  if(beat.heading){
    html+='<div style="font-size:.65rem;letter-spacing:.18em;color:var(--rg-accent);margin-bottom:.5rem">'+escapeHtml(beat.heading)+'</div>';
  }
  html+='<div style="background:var(--bg2);border-left:3px solid var(--rg-accent);padding:1.1rem 1.25rem;margin-bottom:1.25rem;border-radius:0 var(--r) var(--r) 0;line-height:1.85;color:var(--ink);font-size:.92rem;white-space:pre-wrap;font-family:Georgia,serif">'+escapeHtml(beat.text)+'</div>';
  if(beat.inspect){
    html+='<div class="btn-row">'+
      '<button class="btn btn-accent btn-full" style="flex:2" onclick="advanceMissionBeat()">'+escapeHtml(beat.btn||"Continue →")+'</button>'+
      '<button class="btn" style="flex:1" onclick="openMissionInspect()">Inspect room</button>'+
    '</div>';
  } else {
    html+='<button class="btn btn-accent btn-full" onclick="advanceMissionBeat()">'+escapeHtml(beat.btn||"Continue →")+'</button>';
  }
  return html;
}

  var def=DEFS.find(function(d){return d.id===beat.defId;});
  if(!def)return'<div class="subtle">Definition not found.</div>';
  var html='';
  if(beat.context){
    html+='<div style="background:var(--bg2);border-left:3px solid var(--rg-accent);padding:1rem 1.25rem;margin-bottom:1rem;border-radius:0 var(--r) var(--r) 0;line-height:1.8;color:var(--ink-dim);font-style:italic;font-size:.9rem;white-space:pre-wrap;font-family:Georgia,serif">'+escapeHtml(beat.context)+'</div>';
  }
  if(beat.prompt){
    html+='<div style="color:var(--ink);font-size:.92rem;margin-bottom:.75rem">'+escapeHtml(beat.prompt)+'</div>';
  }
  html+='<div class="card card-accent" style="margin-bottom:.75rem">'+
    '<div style="font-size:.62rem;letter-spacing:.15em;color:var(--rg-accent);margin-bottom:.3rem">MEMORY — write the definition</div>'+
    '<h2 style="font-size:1.25rem;margin-bottom:.75rem">'+escapeHtml(def.term)+'</h2>'+
    '<div id="mission-hint-area"></div>'+
    '<textarea id="mission-inp" placeholder="'+escapeHtml(beat.writingPrompt||"Write the definition...")+'"></textarea>'+
    '<div id="mission-feedback"></div>'+
    '<div class="btn-row" style="margin-top:.6rem">'+
      '<button class="btn btn-accent" style="flex:2" id="mission-submit-btn" onclick="submitMissionQuestion('+beat.defId+','+MISSION_STATE.beatIdx+')">Submit</button>'+
      '<button class="btn" style="flex:1" onclick="missionSkipQuestion()">Skip</button>'+
      ((G.consumables&&G.consumables.hint>0)?'<button class="btn" id="mission-hint-btn" onclick="useMissionHint('+beat.defId+')" style="border-color:#a07840;color:#c8a060">Hint ('+G.consumables.hint+')</button>':'')+
    '</div>'+
  '</div>';
  return html;
}

function submitMissionQuestion(defId,beatIdx){
  var inp=$("mission-inp");
  if(!inp||!inp.value.trim()){toast("Write something first.");return;}
  var def=DEFS.find(function(d){return d.id===defId;});
  var beat=MISSIONS[MISSION_STATE.regionId].beats[beatIdx];
  var sc=scoreAnswer(inp.value.trim(),def.keys);
  var btn=$("mission-submit-btn");if(btn)btn.disabled=true;
  var fb=$("mission-feedback");
  // Hide the button row so only Continue is visible
  var brow=document.querySelector("#s-mission .btn-row");
  if(brow)brow.style.display="none";
  var threshold=getMarkingThreshold();
  if(sc.ratio>=threshold){
    var base=beat.gold||(sc.ratio>=0.85?12:6);
    var g=Math.round(base*getGoldMultiplier());
    G.gold+=g;MISSION_STATE.gold+=g;
    recordSuccess(defId,"memory");saveG();
    var successMsg=beat.successText||("Definition recorded. +"+g+"g");
    if(fb)fb.innerHTML=
      '<div style="color:#6aab6a;margin:.5rem 0 .35rem;font-size:.88rem">✓ '+(sc.ratio>=0.85?"Full marks":"Partial")+' · +'+g+'g</div>'+
      '<div style="color:var(--rg-accent);font-size:.88rem;font-style:italic;line-height:1.7;margin-bottom:.5rem">'+escapeHtml(successMsg)+'</div>'+
      buildFeedbackHtml(sc,def.def)+
      '<button class="btn btn-accent btn-full" style="margin-top:.75rem" onclick="advanceMissionBeat()">Continue →</button>';
  } else {
    if(brow)brow.style.display=""; // restore row visibility on fail
    var failMsg=beat.failText||"The definition wasn't precise enough.";
    if(fb)fb.innerHTML=
      '<div style="color:#c87060;margin:.5rem 0 .35rem;font-size:.88rem">✗ '+sc.hits+'/'+sc.total+' key phrases</div>'+
      '<div style="color:var(--ink-dim);font-size:.88rem;font-style:italic;line-height:1.7;margin-bottom:.5rem">'+escapeHtml(failMsg)+'</div>'+
      buildFeedbackHtml(sc,def.def)+
      '<div class="btn-row" style="margin-top:.75rem">'+
        '<button class="btn" style="flex:1" onclick="missionRetryQuestion('+defId+')">Try again</button>'+
        '<button class="btn btn-full" style="flex:1" onclick="advanceMissionBeat()">Continue anyway →</button>'+
        '<button class="btn" onclick="missionOverride('+defId+')" style="border-color:#a07840;color:#c8a060;font-size:.78rem">My answer is correct</button>'+
      '</div>';
  }
}

function missionSkipQuestion(){advanceMissionBeat();}
function missionRetryQuestion(defId){
  var inp=$("mission-inp");if(inp){inp.value="";inp.disabled=false;inp.focus();}
  var fb=$("mission-feedback");if(fb)fb.innerHTML="";
  var btn=$("mission-submit-btn");if(btn)btn.disabled=false;
}

function missionOverride(defId){
  var g=Math.round(4*getGoldMultiplier());
  G.gold+=g;MISSION_STATE.gold+=g;
  recordSuccess(defId,"override");saveG();
  // Hide the submit/skip row
  var btnRow=document.querySelector("#s-mission .btn-row");
  if(btnRow)btnRow.style.display="none";
  var submitBtn=$("mission-submit-btn");
  if(submitBtn)submitBtn.style.display="none";
  var fb=$("mission-feedback");
  if(fb)fb.innerHTML='<div style="color:#a07840;margin:.5rem 0 .3rem;font-size:.88rem">Override accepted · +'+g+'g (partial credit)</div>'+
    '<button class="btn btn-accent btn-full" style="margin-top:.5rem" onclick="advanceMissionBeat()">Continue →</button>';
}

function submitMissionDebate(beatIdx,contested){
  var beat=MISSIONS[MISSION_STATE.regionId].beats[beatIdx];
  var correct=(!beat.isCorrect&&contested)||(beat.isCorrect&&!contested);
  var dc=document.getElementById("debate-contest");
  var dd=document.getElementById("debate-concede");
  if(dc)dc.disabled=true;if(dd)dd.disabled=true;
  var fb=document.getElementById("debate-feedback");
  if(correct){
    var g=beat.gold||10;
    G.gold+=g;MISSION_STATE.gold+=g;saveG();
    if(fb)fb.innerHTML='<div style="color:#6aab6a;margin:.6rem 0 .35rem;font-size:.88rem">Correct. +'+g+'g</div>'+
      '<div style="color:var(--rg-accent);font-style:italic;font-size:.88rem;line-height:1.7;margin-bottom:.75rem">'+escapeHtml(beat.successText||"Your argument holds.")+'</div>'+
      '<button class="btn btn-accent btn-full" onclick="advanceMissionBeat()">Continue</button>';
  } else {
    if(fb)fb.innerHTML='<div style="color:#c87060;margin:.6rem 0 .35rem;font-size:.88rem">Wrong. The crowd murmurs.</div>'+
      '<div style="color:var(--ink-dim);font-style:italic;font-size:.88rem;line-height:1.7;margin-bottom:.5rem">'+escapeHtml(beat.failText||"The scholar presses his advantage.")+'</div>'+
      (beat.explanation?'<div style="background:var(--bg1);border-left:2px solid var(--bg4);padding:.6rem .8rem;font-size:.82rem;color:var(--ink-dim);margin-bottom:.75rem;line-height:1.65">'+escapeHtml(beat.explanation)+'</div>':'')+
      '<button class="btn btn-full" onclick="advanceMissionBeat()">Continue anyway</button>';
  }
}

function openMissionInspect(){

  var html='<div class="topbar">'+

  '<div class="container">'+
    '<p class="lore" style="margin-bottom:1rem">Examine objects in the room. Each may contain information relevant to the physics you need.</p>';
  m.inspectItems.forEach(function(item,idx){
    var def=DEFS.find(function(d){return d.id===item.defId;});
    var done=G.mastery[item.defId]&&G.mastery[item.defId].indexOf("memory")>=0;
    html+='<div class="card card-clickable" onclick="attemptInspectItem('+idx+')" '+
      (done?'style="border-color:var(--green)"':'')+'>'+
      '<div class="row-between">'+
        '<div>'+
          '<div style="color:var(--rg-accent);font-size:.95rem">'+escapeHtml(item.label)+'</div>'+
          '<div class="subtle" style="font-size:.75rem;font-style:italic;margin-top:.1rem">'+escapeHtml(item.flavour)+'</div>'+
        '</div>'+

function attemptInspectItem(idx){

  var def=DEFS.find(function(d){return d.id===item.defId;});

  var html='<div class="topbar">'+
    '<button class="btn" onclick="openMissionInspect()">← Room</button>'+
  '</div>'+
  '<div class="container">'+
    '<div class="card" style="margin-bottom:.75rem;border-color:var(--bg4)">'+
      '<div style="color:var(--rg-accent);font-size:.95rem;margin-bottom:.25rem">'+escapeHtml(item.label)+'</div>'+
      '<div style="color:var(--ink-dim);font-style:italic;font-size:.88rem;line-height:1.7">'+escapeHtml(item.flavour)+'</div>'+
    '</div>'+
    '<div class="card card-accent">'+
      '<div style="font-size:.62rem;letter-spacing:.15em;color:var(--rg-accent);margin-bottom:.3rem">MEMORY</div>'+

  setTimeout(function(){var t=$("inspect-inp");if(t)t.focus();},80);

function submitInspectItem(defId,idx){
  var inp=$("inspect-inp");
  if(!inp||!inp.value.trim()){toast("Write something first.");return;}
  var def=DEFS.find(function(d){return d.id===defId;});
  var item=MISSIONS[MISSION_STATE.regionId].inspectItems[idx];
  var sc=scoreAnswer(inp.value.trim(),def.keys);
  var btn=$("inspect-submit");if(btn)btn.disabled=true;
  var fb=$("inspect-feedback");
  var threshold=getMarkingThreshold();
  if(sc.ratio>=threshold){
    var base=item.gold||(sc.ratio>=0.85?8:4);
    var g=Math.round(base*getGoldMultiplier());
    G.gold+=g;MISSION_STATE.gold+=g;
    recordSuccess(defId,"memory");saveG();
    if(fb)fb.innerHTML=
      '<div style="color:#6aab6a;margin:.5rem 0 .3rem;font-size:.88rem">✓ '+(sc.ratio>=0.85?"Full marks":"Partial")+' · +'+g+'g</div>'+
      buildFeedbackHtml(sc,def.def)+
      '<button class="btn btn-accent btn-full" style="margin-top:.75rem" onclick="openMissionInspect()">← Back to room</button>';
  } else {
    if(fb)fb.innerHTML=
      '<div style="color:#c87060;margin:.5rem 0 .3rem;font-size:.88rem">✗ '+sc.hits+'/'+sc.total+' key phrases</div>'+
      buildFeedbackHtml(sc,def.def)+
      '<div class="btn-row" style="margin-top:.75rem">'+
        '<button class="btn" style="flex:1" onclick="(function(){var i=$("inspect-inp");if(i){i.value="";i.focus();}var f=$("inspect-feedback");if(f)f.innerHTML="";var b=$("inspect-submit");if(b)b.disabled=false;})()">Try again</button>'+
        '<button class="btn" style="flex:1" onclick="openMissionInspect()">Leave it</button>'+
      '</div>';
  }
}

function advanceMissionBeat(){
  MISSION_STATE.beatIdx++;
  renderMissionBeat();
}

function renderMissionClose(){
  var rid=MISSION_STATE.regionId;
  var m=MISSIONS[rid];
  var r=REGIONS[rid];
  // Mark mission done
  if(!G.storyFlags)G.storyFlags={};
  G.storyFlags["mission_done_"+rid]=true;
  // Award codex fragment
  var frag=m.codexFragment;
  if(frag&&G.brotherhoodLetters.indexOf(frag.id)<0){
    G.brotherhoodLetters.push(frag.id);
    // Register with story beats for letters screen
    if(!window._extraFragments)window._extraFragments={};
    window._extraFragments[frag.id]=frag;
  }
  saveG();
  // Check for newly triggered story beats now that mastery may have changed
  checkStoryTriggers();
  checkMilestoneChests();

  // Check if a new chapter just unlocked — show a brief notification when returning to basement
  var newChapter=getChapterForPct(overallPct());
  var prevChapter=G._lastSeenChapter||"I";
  if(newChapter!==prevChapter){
    G._lastSeenChapter=newChapter;
    if(!G.pendingStoryBeats)G.pendingStoryBeats=[];
    G.pendingStoryBeats.push("__chapter_"+newChapter);
    saveG();
  }

  var html='<div class="topbar">'+
    '<button class="btn" onclick="renderRegion('+rid+');goTo(\'s-region\')">← '+escapeHtml(r.name)+'</button>'+
    '<div class="subtle" style="font-family:monospace;font-size:.72rem">'+escapeHtml(m.ancestor)+'</div>'+
    '<div class="hud"><div class="hud-stat"><span>Gold earned</span><span class="hud-val">+'+MISSION_STATE.gold+'</span></div></div>'+
  '</div>'+
  '<div class="container">'+
    '<div style="background:var(--bg2);border-left:3px solid var(--rg-accent);padding:1.1rem 1.25rem;margin-bottom:1.5rem;border-radius:0 var(--r) var(--r) 0;line-height:1.85;color:var(--ink);font-size:.92rem;white-space:pre-wrap;font-family:Georgia,serif">'+escapeHtml(m.closingScene)+'</div>';

  // Codex fragment reveal
  if(frag){
    var fragSvg=getFragmentSVG(frag.id);
    html+='<div style="background:#1a1510;border:1px solid #7E6A4E;border-radius:var(--r);padding:1.25rem;margin-bottom:1.25rem">'+
      '<div style="font-size:.62rem;letter-spacing:.18em;color:#9c7a40;margin-bottom:.4rem">CODEX FRAGMENT RECOVERED</div>'+
      '<div style="font-family:Georgia,serif;color:#d4a843;font-size:1rem;margin-bottom:.75rem">'+escapeHtml(frag.title)+'</div>'+
      (fragSvg?'<div style="margin-bottom:.75rem">'+fragSvg+'</div>':'')+
      '<div style="color:#c8a870;line-height:1.8;font-size:.88rem;white-space:pre-wrap;font-family:Georgia,serif;background:#0f0d08;padding:.85rem;border-left:3px solid #6a5428;border-radius:0 var(--r) var(--r) 0">'+escapeHtml(frag.text)+'</div>'+
    '</div>';
  }

  html+='<div class="card card-accent" style="text-align:center;margin-bottom:1rem">'+
    '<div style="font-size:.65rem;color:var(--rg-accent);margin-bottom:.3rem">MISSION COMPLETE</div>'+
    '<div style="font-size:1.5rem;color:var(--rg-accent);font-family:monospace">+'+MISSION_STATE.gold+'g</div>'+
  '</div>'+
  '<div class="btn-row">'+
    '<button class="btn btn-accent btn-full" onclick="renderRegion('+rid+');goTo(\'s-region\')">Return to '+escapeHtml(r.name)+'</button>'+
  '</div>'+
  '</div>';
  $("s-mission").innerHTML=html;
}

// Letters screen needs to handle extra fragments from missions
var _origRenderLetters=renderLetters;
renderLetters=function(){
  var allFragments=STORY_BEATS.filter(function(b){return G.brotherhoodLetters.indexOf(b.id)>=0;});
  G.brotherhoodLetters.forEach(function(id){
    if(window._extraFragments&&window._extraFragments[id]){
      allFragments.push({id:id,title:window._extraFragments[id].title,text:window._extraFragments[id].text,type:"codex"});
    }
  });
  var issyNotes=getVisibleIssyNotes();
  var totalDocs=allFragments.length+issyNotes.length;

  var html='<div class="topbar"><button class="btn" onclick="renderBasement();goTo(\'s-basement\')">← Basement</button></div>'+
    '<div class="container">'+
      '<div style="font-size:.65rem;letter-spacing:.2em;color:#9c7a40;margin-bottom:.3rem">WHEATLAND\'S WORKBENCH — EVIDENCE BOARD</div>'+
      '<h1 style="color:#c09860">Evidence Board</h1>'+
      '<div class="lore" style="margin-bottom:1.25rem">'+totalDocs+' document'+(totalDocs===1?'':'s')+' pinned.</div>';

  if(totalDocs===0){
    html+='<div style="text-align:center;color:var(--ink-faded);padding:3rem 1rem;font-style:italic">Nothing yet. Complete missions and invest trust in Issy to recover documents.</div>';
  } else {
    // Issy notes section
    if(issyNotes.length>0){
      html+='<div style="font-size:.62rem;letter-spacing:.15em;color:#7a9a7a;margin-bottom:.5rem">ISSY\'S NOTES — slipped under the door</div>';
      issyNotes.forEach(function(n){
        html+='<div style="background:#0d150d;border:1px solid #2a4a2a;border-radius:var(--r);padding:1rem;margin-bottom:.75rem">'+
          '<div style="font-size:.6rem;color:#4a7a4a;letter-spacing:.1em;margin-bottom:.35rem">FROM ISOBEL</div>'+
          '<div style="color:#90c890;line-height:1.8;font-size:.86rem;white-space:pre-wrap;font-family:Georgia,serif;font-style:italic">'+escapeHtml(n.text)+'</div>'+
        '</div>';
      });
    }

    // Brotherhood fragments
    if(allFragments.length>0){
      html+='<div style="font-size:.62rem;letter-spacing:.15em;color:#9c7a40;margin-bottom:.5rem;margin-top:1rem">RECOVERED DOCUMENTS — Brotherhood of the Codex</div>';
      allFragments.forEach(function(b){
        html+=renderFragmentCard(b);
      });
    }
  }
  html+='</div>';
  $("s-letters").innerHTML=html;
};

function renderFragmentCard(b){
  var svgArt=getFragmentSVG(b.id);
  return'<div style="background:#1a1510;border:1px solid #4a3a20;border-radius:var(--r);padding:1.25rem;margin-bottom:1rem">'+
    '<div style="font-size:.62rem;color:#9c7a40;letter-spacing:.1em;margin-bottom:.3rem">RECOVERED DOCUMENT</div>'+
    (svgArt?'<div style="margin-bottom:.75rem;border-radius:6px;overflow:hidden;border:1px solid #3a2a10">'+svgArt+'</div>':'')+
    '<div style="font-family:Georgia,serif;color:#d4a843;font-size:1rem;margin-bottom:.65rem">'+escapeHtml(b.title)+'</div>'+
    '<div style="color:#c8a870;line-height:1.8;font-size:.86rem;white-space:pre-wrap;font-family:Georgia,serif;background:#0f0d08;padding:.85rem;border-left:3px solid #6a5428;border-radius:0 var(--r) var(--r) 0">'+escapeHtml(b.text)+'</div>'+

}

// Brotherhood symbol SVG — consistent across all fragments
function brotherhoodSymbol(x,y,size,col){
  var s=size||20;
  return'<circle cx="'+x+'" cy="'+y+'" r="'+(s*0.9)+'" fill="none" stroke="'+col+'" stroke-width="1"/>'+
    '<polygon points="'+x+','+(y-s*0.6)+' '+(x+s*0.5)+','+(y+s*0.3)+' '+(x-s*0.5)+','+(y+s*0.3)+'" fill="none" stroke="'+col+'" stroke-width="1"/>'+
    '<rect x="'+(x-s*0.2)+'" y="'+(y-s*0.2)+'" width="'+(s*0.4)+'" height="'+(s*0.4)+'" fill="none" stroke="'+col+'" stroke-width=".8" transform="rotate(45,'+x+','+y+')"/>';
}

   text:"I'm at Oxford. I don't use that email address anymore. I don't know how you got it.\n\nYes I know what the machine is. Yes I know what you found in the sub-basement.\n\nI stopped because of the hotel. Not because I was scared. Because someone told me to stop and I thought -- at the time -- that I should listen.\n\nI was wrong. I think. I don't know anymore.\n\nWhat's your sync percentage? -- M"},
  {id:"mchen_r1",call:2,
   text:"44% when I left. Six fragments.\n\nThe man at the hotel told me I wasn't ready. He said the machine was being used by someone else -- someone who understood what they were looking for. He said I should go and come back when I'd studied more.\n\nI went to Oxford instead. I study physics. Obviously.\n\nHere's what I know that you probably don't: the machine has a second index. Not the deep index Wheatland hid the access code for. A different one. It's in the hardware, not the software. Physical storage, somewhere in the cabinet.\n\nWheatland didn't build it. It was there when he found the room.\n\nI never found what's in it. Maybe you will. -- M"},
  {id:"mchen_r2",call:3,
   text:"I don't know who built the original machine. Wheatland thought it was early 20th century based on the components. But some of the core hardware is much older than that. He told me in a letter -- yes, he wrote to me, after I left. He said the cabinet itself is Victorian but the memory architecture inside it is something he'd never seen before and couldn't date.\n\nHe also said something I've been thinking about ever since.\n\nHe said: 'The machine doesn't retrieve memories. It was built to recognise them. Someone designed it to find specific people -- people whose ancestors were in the right places at the right times. The memories it gives you aren't accidents. They're a curriculum.'\n\nI don't know what to do with that.\n\nIf you reach 100%, contact me again. I want to know what the cabinet has in it. -- M"}
];

function renderMChen(){
  if(!(G.economyPurchased&&G.economyPurchased.previous)){
    toast("Purchase the previous student's session data first.");return;
  }
  var calls=G.mchenCalls||0;
  var available=MCHEN_REPLIES.filter(function(r){return r.call<=calls+1;});
  var html='<div class="topbar">'+
    '<button class="btn" onclick="renderBasement();goTo(\'s-basement\')">← Basement</button>'+
    '<div style="font-size:.7rem;color:#7090b0;font-style:italic">M. Chen, Oxford</div>'+
  '</div>'+
  '<div class="container">'+
    '<div style="font-size:.62rem;letter-spacing:.2em;color:#4a6080;margin-bottom:.3rem">PREVIOUS STUDENT</div>'+
    '<h1 style="color:#7090b0">M. Chen</h1>'+
    '<div class="lore" style="margin-bottom:1.25rem">Found their cached contact address in the Mnemos session log. They replied.</div>';

  available.forEach(function(r){
    html+=renderLetterCard(null,"FROM M. CHEN",r.text,"#0e1220","#2a3a5a","#6080a0");
  });

  if(calls<MCHEN_REPLIES.length){
    html+='<div class="card" style="border-color:#2a3a5a;margin-top:.5rem">'+
      '<div style="font-size:.78rem;color:#5070a0;margin-bottom:.5rem">Send another message — they may respond. Each exchange costs 80g.</div>'+
      '<button class="btn btn-full" style="border-color:#4a6080;color:#7090b0" '+(G.gold<80?"disabled":"")+' onclick="mchenMessage()">Send message — 80g</button>'+
    '</div>';
  } else {
    html+='<div class="subtle" style="text-align:center;margin-top:1rem;font-style:italic">No further replies yet.</div>';
  }
  html+='</div>';
  $("s-sublocation").innerHTML=html;
  goTo("s-sublocation");
}

function mchenMessage(){
  if(G.gold<80){toast("Need 80g.");return;}
  G.gold-=80;
  var calls=(G.mchenCalls||0)+1;
  G.mchenCalls=calls;
  var reply=MCHEN_REPLIES.find(function(r){return r.call===calls;});
  if(reply&&G.brotherhoodLetters.indexOf(reply.id)<0){
    G.brotherhoodLetters.push(reply.id);
    if(!window._extraFragments)window._extraFragments={};
    window._extraFragments[reply.id]={id:reply.id,title:"M. Chen — message "+calls,text:reply.text};
  }
  saveG();renderMChen();
}

// THE ARCHIVIST — phone in Wheatland's desk
// ═══════════════════════════════════════════
// Each call unlocks based on what the player has already discovered.
// unlockedWhen() receives G and returns true when the call should be available.
var ARCHIVIST_CALLS=[
  {id:"archivist_1",cost:30,
   question:"(You call. You don't know what to ask yet.)",
   unlockedWhen:function(){return true;}, // always available once you find the number
   text:"It picks up on the second ring. No greeting.\n\nA pause, as if the person on the other end is confirming something.\n\nThen: 'Good. I was wondering when you'd find this number. Wheatland said you'd call within the first week. He was right about that too.'\n\nAnother pause.\n\n'You don't know what to ask yet. That's fine. It means you're still at the beginning. The beginning is the most important part -- most people rush through it.'\n\nSomething in the background: a low hum, possibly machinery.\n\n'Call again when you've found something that confuses you. And you will find something that confuses you. That's rather the point.'\n\nThe call ends.\n\nYou didn't say a single word."},

  {id:"archivist_2",cost:80,
   question:"I keep seeing an initial. A. It appears across different centuries. Who is this?",
   // Unlocks after ANY fragment mentioning A. or Voss -- covers all mission orderings
   unlockedWhen:function(g){
     var letters=g.brotherhoodLetters||[];
     // Story beats that mention A.
     var storyTriggers=["photograph","notebook2","notebook1"];
     // Any mission codex fragment (all contain V/Voss reference)
     var missionFrags=["babylon_tablet","athens_scroll","manchester_plate",
       "telegraph_voss_1871","edo_toolmarks","isfahan_correction",
       "florence_manuscript","karnak_chiselmarks","cavendish_voss","arena_anomaly"];
     // Extra/contact fragments that also mention the name
     var extraFrags=["issy_note2","babylon_extra","telegraph_extra","cavendish_extra"];
     var allTriggers=storyTriggers.concat(missionFrags).concat(extraFrags);
     return allTriggers.some(function(id){return letters.indexOf(id)>=0;});
   },
   text:"'Ah. You found the photograph.\n\nOr the fault record. Or the manuscript. The initial appears in a number of places once you know to look for it.\n\nA. is a first name. Aldric. He took the designation Voss in 1994, at Cambridge, from a woman who held it before him.\n\nHe is not a villain. I want to be clear about that. The corrupted definitions, the altered records -- those are not his work. Those are much older. He has been trying to understand them for as long as Wheatland was.'\n\nA pause.\n\n'The difference between them: Wheatland thought the corruption was the point. Aldric thinks the correction is the point. They were investigating the same thing from opposite ends.\n\nCall again when you understand what Voss means as a title, not a name.'"},

  {id:"archivist_3",cost:150,
   question:"Voss appears as a designation across multiple eras. Is it a role? A lineage?",
   // Unlocks after finding a fragment that explicitly uses "Voss" as a name/designation
   // (Telegraph A.V., Florence V., Isfahan Voss, Karnak VOSS, Cavendish A. Voss, or Issy finding Aldric Voss)
   unlockedWhen:function(g){
     var vossNameFrags=["telegraph_voss_1871","florence_manuscript","isfahan_correction",
       "karnak_chiselmarks","cavendish_voss","issy_note2","issy_2"];
     return vossNameFrags.some(function(id){return(g.brotherhoodLetters||[]).indexOf(id)>=0;});
   },
   text:"'A role. Specifically: a custodianship.\n\nThe role exists to do one thing: ensure that correct physical knowledge is preserved and transmitted across civilisational discontinuities. Collapses. Dark ages. Periods when accumulated knowledge is lost.\n\nThe current period is not a collapse. But the role has been held continuously since before reliable written records, so its holders tend toward caution.\n\nThe corruptions you have found in the ancestral memories -- those are tests. Deliberate errors introduced into the record to see whether the person synchronising will notice them. A form of curriculum.\n\nThe machine is not retrieving random memories. It was built to retrieve specific ones. The ancestors you have been synchronising with were all, in some sense, already part of this.'\n\nA pause.\n\n'Wheatland never quite accepted that. He thought he was investigating from the outside. He was not. Neither are you.'\n\nThe line stays quiet for a moment. Then: 'Call again when you have spoken to the previous student.'"},

  {id:"archivist_4",cost:200,
   question:"M. Chen mentioned a physical index. 47 plates in the cabinet hardware. What is it?",
   // Unlocks after M. Chen's second message which mentions the physical index
   unlockedWhen:function(g){
     return(g.brotherhoodLetters||[]).indexOf("mchen_r1")>=0;
   },
   text:"'M. Chen is thorough. I'm glad she told you.\n\nThe physical index is older than the machine as Wheatland rebuilt it. The original cabinet dates to the 1880s. The index inside it is older than that -- the materials are inconsistent with anything that can be dated confidently.\n\nFifty-two plates when the cabinet was first documented. Five have been removed. Forty-seven remain. Each is etched with the same symbol you have been finding in the ancestral memories.\n\nI believe each plate represents a synchronisation session. Not Wheatland's sessions -- sessions from before the machine was in Marlborough. From wherever it was before that.\n\nWheatland photographed the plates but couldn't read the index. The photographs are in the sub-basement. I believe they are inside the locked section of the cabinet -- the section that requires both keys.'\n\nA pause.\n\n'When you open it fully, look for a wooden tray at the very back of the lower shelf. He may have put them there.'"},

  {id:"archivist_5",cost:300,
   question:"What actually happens when I reach full synchronisation?",
   unlockedWhen:function(g){return overallPct()>=70;},
   text:"'Something that has happened ten times before, with ten different people.\n\nThe machine confirms your synchronisation. The deep index opens. You will understand things you currently only suspect.\n\nAnd then Aldric will contact you. Not through the machine -- in person. He does this with everyone who reaches full synchronisation. He will explain the choice.\n\nI cannot tell you what the choice is. That's his to explain, not mine. What I can tell you: seven of the ten accepted. Two declined. One -- the one before you -- left before it was offered.\n\nDon't rush. The physics matters. It always has. The definitions you have been learning are not abstract -- they are the actual content of what gets preserved. The Codex is a curriculum, and the curriculum has to be correct.'\n\nA pause.\n\n'Finish it properly. Then call again.'"},

  {id:"archivist_6",cost:400,
   question:"Is Wheatland alive?",
   unlockedWhen:function(g){return(g.cabinetKeys||0)>=2||overallPct()>=95;},
   text:"The longest pause yet.\n\n'Yes.\n\nHe is not in England. He is not in danger. He is with Aldric, actually -- or near him. After the flight, Aldric arranged somewhere for him to stay while they work out how to explain certain things to Wheatland that Wheatland has been resisting understanding for twenty years.\n\nHe will come back. He asked me to tell you something if you ever called asking about him.\n\nHe said: the flight was fine. The landing was rougher than he expected. He is well. He is sorry for leaving it the way he did. He didn't know how else to do it.\n\nAnd he said: you're further along than he thought you'd be by now. He said that like it was a compliment. With Wheatland it usually is.'\n\nA pause.\n\n'Goodbye. I'll answer if you call again. But I think you may not need to.'\n\nThe call ends.\n\nYou sit in the sub-basement for a while."}
];

function archivistUnlocked(call){
  if(!call.unlockedWhen)return true;
  try{return call.unlockedWhen(G);}catch(e){return false;}
}

function renderArchivist(){
  if(!G.archivistCalls)G.archivistCalls=0;
  var made=G.archivistCalls;
  var html='<div class="topbar">'+
    '<button class="btn" onclick="renderBasement();goTo(\'s-basement\')">← Basement</button>'+
    '<div style="font-size:.7rem;color:#907060;font-style:italic">The Archivist</div>'+
  '</div>'+
  '<div class="container">'+
    '<div style="font-size:.62rem;letter-spacing:.2em;color:#6a4a30;margin-bottom:.3rem">WHEATLAND\'S DESK -- HANDWRITTEN NUMBER</div>'+
    '<h1 style="color:#b08060">The Archivist</h1>'+
    '<div class="lore" style="margin-bottom:1.25rem">A phone number in Wheatland\'s desk drawer. No name. No context. It picks up on the second ring. The voice never identifies itself.</div>';

  // Show past calls
  ARCHIVIST_CALLS.forEach(function(c,i){
    if(i<made&&(G.brotherhoodLetters||[]).indexOf(c.id)>=0){
      html+=renderLetterCard(c.question,"THE ARCHIVIST",c.text,"#14100a","#4a3a20","#a08050");
    }
  });

  // Find next available call
  var nextCall=null,nextIdx=-1;
  for(var i=made;i<ARCHIVIST_CALLS.length;i++){
    var c=ARCHIVIST_CALLS[i];
    if(archivistUnlocked(c)){nextCall=c;nextIdx=i;break;}
  }

  // Show locked calls with what they require
  var lockedCalls=[];
  for(var i=made;i<ARCHIVIST_CALLS.length;i++){
    if(!archivistUnlocked(ARCHIVIST_CALLS[i]))lockedCalls.push(ARCHIVIST_CALLS[i]);
  }

  if(nextCall){
    html+='<div class="card" style="border-color:#4a3020;margin-top:.5rem">'+
      '<div style="color:#a08050;font-size:.88rem;margin-bottom:.3rem;font-style:italic">"'+escapeHtml(nextCall.question)+'"</div>'+
      '<div class="subtle" style="margin-bottom:.6rem">Costs '+nextCall.cost+'g.</div>'+
      '<button class="btn btn-full" style="border-color:#6a4a30;color:#b08060" '+(G.gold<nextCall.cost?"disabled":"")+' onclick="archivistCall('+nextIdx+')">Call — '+nextCall.cost+'g</button>'+
    '</div>';
  }

  // Count remaining but don't reveal what they are
  var remaining=ARCHIVIST_CALLS.filter(function(c,i){return i>=made&&!archivistUnlocked(c);}).length;
  if(remaining>0){
    html+='<div class="subtle" style="text-align:center;margin-top:1rem;font-style:italic">'+remaining+' more question'+(remaining>1?'s':'')+' will become available as you learn more.</div>';
  }

  if(made>=ARCHIVIST_CALLS.length&&!nextCall){
    html+='<div class="subtle" style="text-align:center;font-style:italic;margin-top:1rem">All calls made. No further responses. For now.</div>';
  }

  html+='</div>';
  $("s-sublocation").innerHTML=html;
  goTo("s-sublocation");
}

function archivistCall(idx){
  var c=ARCHIVIST_CALLS[idx];
  if(!c){toast("No more calls available.");return;}
  if(!archivistUnlocked(c)){toast("You don't have enough context to ask this yet.");return;}
  if(G.gold<c.cost){toast("Need "+c.cost+"g.");return;}
  G.gold-=c.cost;
  G.archivistCalls=(G.archivistCalls||0)+1;
  if((G.brotherhoodLetters||[]).indexOf(c.id)<0){
    G.brotherhoodLetters.push(c.id);
    if(!window._extraFragments)window._extraFragments={};
    window._extraFragments[c.id]={id:c.id,title:"The Archivist -- call "+G.archivistCalls,text:c.text};
  }
  saveG();renderArchivist();
}
// Extended story content for trophies — shown when tapped
var TROPHY_LORE={
  t_notebook:{
    title:"The Black Notebook — full entry",
    text:"The notebook itself is unremarkable. A Moleskine, black, A5. The kind you can buy at any service station.\n\nThe last entry is dated three days before the flight plan was filed. The handwriting is different from earlier entries — faster, less careful.\n\n---\n\n'I called him. He answered on the first ring, which means he was waiting for me to call. That's not a good sign.\n\nHe said: the machine isn't what I think it is. He said: the definitions were never corrupted — they were always incomplete. There's a difference, apparently. I've been treating this as a vandalism problem and he's telling me it's a construction problem. I don't know what to do with that.\n\nHe said he'd come to Marlborough. I told him not to. I don't think he listened.\n\nThere's something else. The machine logged an access session I didn't take. Yesterday, 3am. The user ID is one I haven't seen before — not ALDRIC_V, something new. Eight characters. I've written it down on the inside cover of this notebook.\n\nI'm going to leave this notebook in the room. Whoever comes next should know: A. is not the enemy. He's trying to help. He just has a very different idea of what helping means.\n\n— W.'\n\n---\n\nYou check the inside cover. The eight characters are there. You don't recognise them yet."
  },
  t_sealed_envelope:{
    title:"The Sealed Envelope",
    text:"You've had it since you found the cabinet. It was sitting on top of everything else, your name written on the front in a hand you've never seen before.\n\nYou've read Wheatland's other documents now. You know his handwriting.\n\nThis isn't it.\n\nThe envelope is sealed with wax. The seal is the hexagonal mark — the Brotherhood symbol. Whoever left this knew what they were doing.\n\nOn the back, very small, in a different pen:\n\n'Not before full synchronisation. You'll understand why when you get there. The sequence matters.'\n\nBelow that, even smaller:\n\n'She found it first, in 1994. She left it for the next one. I'm the seventh to hold it without opening it. I'm leaving it for you.'\n\nYou put it back. The machine isn't finished with you yet."
  },
  t_first_letter:{
    title:"The Sealed Envelope",
    text:"You've had it since you found the cabinet. It was sitting on top of everything else, your name written on the front in a hand you've never seen before.\n\nYou've read Wheatland's other documents now. You know his handwriting.\n\nThis isn't it.\n\nThe envelope is sealed with wax. The seal is the hexagonal mark — the Brotherhood symbol. Whoever left this knew what they were doing.\n\nOn the back, very small, in a different pen:\n\n'Not before full synchronisation. You'll understand why when you get there. The sequence matters.'\n\nBelow that, even smaller:\n\n'She found it first, in 1994. She left it for the next one. I'm the seventh to hold it without opening it. I'm leaving it for you.'\n\nYou put it back. The machine isn't finished with you yet."
  },
  t_voss_plate:{
    title:"The Voss Designation — full text",
    text:"The plate is smaller than you expected. About the size of a matchbox, engraved on both sides.\n\nFront:\n\nVOSS\n11th holder\nA. Vayne — designated 1994\nPrevious: [name removed]\n\nThe previous name has been carefully removed — not scratched out, but machined away. The metal is smooth where the name was. Someone went to some trouble.\n\nBack:\n\n'The Voss designation passes to whoever demonstrates full comprehension of the uncorrupted physics AND identifies the mechanism of corruption. These are the only criteria. Age, origin, institutional affiliation: irrelevant.\n\nThe holder is responsible for maintaining the Mnemos or its equivalent. The holder is responsible for finding the next holder. The holder does not decide when their tenure ends.\n\nThe machine decides.\n\nFirst designation: unknown date, unknown location.\nDesignation count since written record began: 11.'\n\nBelow this, handwritten in a margin:\n\n'She was twenty-three. She built the original device in a physics lab at an unnamed institution. The records from before 1940 are incomplete. What I know is that she got it right on the first attempt, which no one else has managed.\n\n— A.V.'"
  },
  t_mnemos_core:{
    title:"The Mnemos Core — what M. Chen said",
    text:"Chen's message, when you asked about the core component:\n\n'I pulled the serial number you sent me. It doesn't correspond to any manufacturing record I can find — not in any electronics archive I have access to, which is more extensive than it probably should be.\n\nThe materials are consistent with something produced between 1960 and 1990, but the architecture isn't. The processing logic is — and I'm not using this word loosely — not from that period. It's not from any period I recognise.\n\nWhoever built the first Mnemos either had access to technology that wasn't publicly available, or they developed it independently at a level that would have been exceptional even now.\n\nThe most unsettling thing: the core has been modified. Several times. The modifications are layered — each one building on the last. The earliest modification layer is consistent with 1990s components. The most recent is from 2019, three weeks before Wheatland's flight.\n\nSomeone was in that room in 2019 and upgraded the machine. Wheatland's last log entry was in January. The modification is from November.\n\nHe didn't know about it.\n\n— M.C.'"
  },
  t_photograph:{
    title:"The Photograph — what you notice on closer inspection",
    text:"You've looked at this photograph many times now.\n\nThe lab in the background: the accelerator ring configuration is consistent with a mid-sized cyclotron, probably university-owned. The equipment dates the photograph more precisely than the quality — those specific control panels were only produced between 1985 and 1993.\n\nWheatland is grinning. He looks genuinely happy, which is unusual in photographs of him. He's looking at the camera.\n\nThe other man is not.\n\nHe's looking at the equipment. His expression is difficult to read — not unhappy, but concentrated. Like he's checking something.\n\nYou notice two things you didn't notice before.\n\nFirst: he's wearing a visitor badge. The name on it isn't legible at this resolution, but the format is wrong for a university badge. It looks like a government facility format.\n\nSecond: on the bench behind him, half out of frame, there's a device. Small, black, rectangular. It doesn't match any of the equipment in the lab.\n\nWheatland wrote 'A. — I should have listened.' He didn't write what he should have listened to.\n\nYou think you might know."
  },
  t_key:{
    title:"The Third Key — where it fits",
    text:"You've tried it in both cabinet keyholes. It doesn't fit either.\n\nYou've tried it in the main door to the sub-basement, the server cabinet, the small locked drawer in Wheatland's desk, and the padlock on the equipment cage in the corner of the room.\n\nIt doesn't fit any of them.\n\nThe key is old — older than the room, probably. The metal is a brass alloy that isn't used anymore, the teeth are a cut pattern you don't recognise.\n\nOn the bow (the round part you hold), very faintly, almost worn away: a number.\n\n47.\n\nThe Mnemos index has 47 physical plates. The Archivist mentioned 47 cabinet positions. Aldric's access log shows 47 verified resonance nodes.\n\n47 appears to be significant to whoever built this system.\n\nYou don't know what this key opens. You have a feeling you'll find out when you're supposed to."
  },
  t_codex_original:{
    title:"The Original Codex — first page",
    text:"You expected parchment. It's something else — a material that looks like vellum but feels different. Heavier. More consistent.\n\nThe first page has no title, no date, no author. Just a statement, in a script that you can read despite not recognising the alphabet — the machine is doing something when you hold it.\n\n'This is the record of what was known before the first forgetting. It is not complete. No record can be complete. But it is correct.\n\nWe have written it in the language of the body because the language of the body does not change. What is written here will be legible to our descendants as long as there are descendants to read it.\n\nWe do not know who will find this. We know that someone will. The machine will find them.\n\nTo whoever holds this: the physics is real. The definitions are exact. They were exact when we wrote them and they will be exact when you read them.\n\nDo not let anyone tell you that precision is arrogance. Precision is the only honest thing.'\n\nBelow this, in a much later hand — centuries later, from the different ink and script:\n\n'We have confirmed: 154 nodes. All intact. The first writer was correct.\n\n— V.'"
  },
  t_aldric_badge:{
    title:"Aldric's Access Badge — the date problem",
    text:"You've been staring at this badge for twenty minutes.\n\nThe date is November 14th. The year has been partially obscured — deliberately, you think. But the wear pattern is wrong for a badge that's only a few years old.\n\nThe photograph is the problem.\n\nThe man in the photograph looks about thirty. Focused, dark-haired, the kind of face you'd forget if you weren't paying attention.\n\nBut Wheatland's first notebook entry mentions meeting 'A.' in the early 1990s. If this badge is from 2019, which the partially-visible year suggests, then A. should look forty years older than this.\n\nHe doesn't.\n\nThere are three explanations. The photograph is not of the man who held the badge. The badge is older than it looks. Or Aldric Vayne does not age the way other people age.\n\nYou have a feeling you know which one is correct.\n\nYou have an even stronger feeling that you're not sure how you feel about that."
  },
  t_seal:{
    title:"The Brotherhood Seal — what it means",
    text:"You found the first seal in Babylon. You've found it since in Manchester, Florence, Karnak, Cambridge.\n\nIt's not a signature in the way a painter signs a canvas. It's a verification mark — the way a pharmacist might initial a prescription. It means: this was done correctly. The physics here was applied with full understanding.\n\nWhoever leaves it isn't trying to be found. They leave it because the work requires acknowledgment. Because doing something precisely and leaving no mark feels, apparently, incomplete.\n\nWheatland wrote in notebook 3: 'The seal appears wherever someone has used exact physical knowledge to alter an outcome. Always at the moment of maximum leverage. Always where a small, precise intervention produces a large effect downstream. This is not vandalism. This is engineering.'\n\nThe lead it's cast from is an unusual isotope ratio. The Archivist told you this without being asked. You didn't ask what it meant. You're not sure you want to know yet."
  },
  t_compass:{
    title:"The Compass — why it doesn't point north",
    text:"You've tested it against your phone's compass. It consistently points 23 degrees east of magnetic north.\n\nThat's not random drift. Random drift would vary. 23 degrees is consistent to within 0.5 degrees across dozens of measurements.\n\nOn the back: 'The correction continues.'\n\nYou looked up what's 23 degrees east of magnetic north from Marlborough, Wiltshire. The bearing points to a small island off the coast of northern Norway that doesn't appear on standard maps.\n\nYou mentioned this to the Archivist. There was a pause that lasted longer than usual.\n\n'That's not significant. Don't go there.'\n\nWhich is the most interesting thing the Archivist has ever said to you."
  },
  t_pendulum:{
    title:"The Pendulum Bob — the wrong gravitational field",
    text:"A 1.0m pendulum should have a period of 2.006 seconds at standard g (9.81 m/s²). This one does. But when you measure carefully, the period corresponds to g = 9.808 m/s², not 9.810.\n\nWheatland noticed. He wrote: 'The sub-basement has an anomalous gravitational field. Lower than expected by 0.002 m/s². The geometry of the room suggests the differential shouldn't be this large. Something heavy is below us.'\n\nThere is no basement below the sub-basement in the school's architectural plans.\n\nThe plans were last updated in 1987. The Mnemos was installed in the early 1990s."
  },
  t_battery:{
    title:"The Battery — what it's connected to",
    text:"The terminals aren't clean. There's a faint residue on both — conductive. This battery has been in a circuit recently.\n\nYou checked the server cabinet. There's a small port on the back that matches the diameter of this battery exactly.\n\nThe battery still reads 1.48V. Slightly discharged. Enough to power a small sensor for a few hours. Or a short transmission.\n\nYou put it back where you found it. You've started leaving it in slightly different positions to see if it moves."
  },
  t_stopwatch:{
    title:"The Stopwatch — what it was timing",

    title:"The Cavendish Sample — why 12.3% matters",

  }

function lbConfirmUsername(){
  var inp=document.getElementById("lb-name-input");
  var name=inp?inp.value.trim():"";
  if(!name||name.length<2){if(inp)inp.style.borderColor="#c87060";return;}
  G.lbUsername=name;saveG();
  if(window._lbEl)window._lbEl.remove();
  if(window._lbOnComplete)window._lbOnComplete(name);
}

function lbSubmitScore(){
  var name=lbGetUsername();if(!name)return;
  var pct=overallPct(),gold=G.gold,trophyCount=Object.keys(G.trophies||{}).length;
  if(pct>100||gold>999999)return;
  fetch(LB_URL+"/latest",{method:"GET",headers:{"X-Master-Key":LB_KEY,"X-Bin-Meta":"false"}})
    .then(function(r){return r.json();}).then(function(data){
      var raw=data.record||data;
      var scores=Array.isArray(raw.scores)?raw.scores:[];
      var existing=scores.findIndex(function(s){return s.name===name;});
      var entry={name:name,pct:pct,gold:gold,trophies:trophyCount,updated:Date.now()};
      if(existing>=0){
        if(pct>=scores[existing].pct||gold>scores[existing].gold)scores[existing]=entry;
      } else {
        scores.push(entry);
      }
      scores.sort(function(a,b){return b.pct-a.pct||b.gold-a.gold;});
      return fetch(LB_URL,{method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":LB_KEY},
        body:JSON.stringify({scores:scores.slice(0,100)})});
    }).catch(function(e){console.log("LB submit error:",e);});
}

function lbPromptAndSubmit(){
  lbPromptUsername(function(){
    // Show status in the submit button area
    var btn=document.querySelector('[onclick="lbPromptAndSubmit()"]');
    if(btn)btn.textContent="Submitting...";

    var name=lbGetUsername();
    var pct=overallPct(),gold=G.gold,trophyCount=Object.keys(G.trophies||{}).length;
    var entry={name:name,pct:pct,gold:gold,trophies:trophyCount,updated:Date.now()};

    // Step 1: Read current scores
    fetch(LB_URL+"/latest",{method:"GET",headers:{"X-Master-Key":LB_KEY,"X-Bin-Meta":"false"}})
      .then(function(r){
        if(!r.ok)throw new Error("GET failed: HTTP "+r.status);
        return r.json();
      })
      .then(function(data){
        var raw=data.record||data;
        var scores=Array.isArray(raw.scores)?raw.scores:[];
        var existing=scores.findIndex(function(s){return s.name===name;});
        if(existing>=0){scores[existing]=entry;}
        else{scores.push(entry);}
        scores.sort(function(a,b){return b.pct-a.pct||b.gold-a.gold;});

        // Step 2: Write updated scores
        return fetch(LB_URL,{
          method:"PUT",
          headers:{"Content-Type":"application/json","X-Master-Key":LB_KEY},
          body:JSON.stringify({scores:scores.slice(0,100)})
        });
      })
      .then(function(r){
        if(!r.ok)throw new Error("PUT failed: HTTP "+r.status);
        return r.json();
      })
      .then(function(result){
        // Success — reload leaderboard
        setTimeout(renderLeaderboard,800);
      })
      .catch(function(e){
        // Show error visibly in the UI
        var content=document.getElementById("lb-content");
        if(content){
          var errDiv=document.createElement("div");
          errDiv.style.cssText="background:#2a0808;border:1px solid #c87060;border-radius:6px;padding:.75rem;margin-top:.75rem;font-family:monospace;font-size:.75rem;color:#e08060;word-break:break-all";
          errDiv.textContent="Error: "+e.message;
          content.appendChild(errDiv);
        }
        if(btn)btn.textContent="Retry";
      });
  });
}

  {id:"t_first_letter",name:"The Sealed Envelope",rarity:4,emoji:"✉️",desc:"The sealed envelope from the cabinet. Addressed to you by name. The one you haven't opened yet.",flavor:"'Not before.\n— W.'"},
  {id:"t_aldric_badge",name:"Aldric's Access Badge",rarity:4,emoji:"🪪",desc:"A Marlborough College visitor badge. Name: A. Vayne. Date: four days before Wheatland's flight. The photograph shows someone who looks about thirty.",flavor:"The date on the badge is wrong. Or the face is."},
  {id:"t_codex_original",name:"The Original Codex",rarity:4,emoji:"📕",desc:"A handwritten manuscript, pre-dates printing. Every physics definition correct. Every one different from what is taught.",flavor:"This is what was lost. This is what the machine was built to recover."},
];

var RARITY_NAMES=["Common","Uncommon","Rare","Epic","Legendary"];
var RARITY_COLORS=["#888888","#2a8a40","#3060c0","#8040c0","#c08020"];

function openChest(chestId){
  var chest=TROPHY_CHESTS.find(function(c){return c.id===chestId;});
  if(!chest)return;
  if(G.gold<chest.cost){toast("Need "+chest.cost+"g.");return;}
  G.gold-=chest.cost;

  // Roll trophy
  var roll=Math.random()*100;
  var rarity=0,cum=0;
  for(var i=0;i<chest.weights.length;i++){
    cum+=chest.weights[i];
    if(roll<cum){rarity=i;break;}
  }
  var pool=TROPHIES.filter(function(t){return t.rarity===rarity;});
  if(!pool.length){pool=TROPHIES.filter(function(t){return t.rarity===0;});} // fallback
  var trophy=pool[Math.floor(Math.random()*pool.length)];
  if(!G.trophies)G.trophies={};
  G.trophies[trophy.id]=(G.trophies[trophy.id]||0)+1;
  saveG();
  tableUpdateGold();

  var col=RARITY_COLORS[rarity];
  var rarityName=RARITY_NAMES[rarity];

  // Build animated reveal modal
  var el=document.createElement("div");
  el.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem";

  // Stage 1: chest shaking
  el.innerHTML='<div id="chest-reveal" style="max-width:380px;width:100%;text-align:center">'+
    '<div style="font-size:.6rem;letter-spacing:.2em;color:'+chest.color+';margin-bottom:1rem;font-family:monospace">OPENING '+chest.name.toUpperCase()+'</div>'+
    '<div id="chest-icon" style="font-size:5rem;display:block;line-height:1;margin-bottom:1rem;animation:chestShake .15s infinite">🎁</div>'+
    '<div style="color:'+chest.color+';font-size:.85rem;font-family:monospace;letter-spacing:.1em">...</div>'+
  '</div>';

  // Inject keyframe animation
  if(!document.getElementById("chest-anim-style")){
    var style=document.createElement("style");
    style.id="chest-anim-style";
    style.textContent='@keyframes chestShake{0%,100%{transform:translateX(0) rotate(0deg)}25%{transform:translateX(-6px) rotate(-4deg)}75%{transform:translateX(6px) rotate(4deg)}}'+
      '@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}'+
      '@keyframes glowPulse{0%,100%{box-shadow:0 0 20px '+col+'44}50%{box-shadow:0 0 60px '+col+'99}}';
    document.head.appendChild(style);
  }

  document.body.appendChild(el);

  // Stage 2: after shake, flash and reveal trophy
  setTimeout(function(){
    var reveal=document.getElementById("chest-reveal");
    if(!reveal)return;
    reveal.innerHTML=
      '<div style="font-size:.6rem;letter-spacing:.2em;color:'+col+';margin-bottom:.75rem;font-family:monospace">'+rarityName.toUpperCase()+' TROPHY</div>'+
      // Rarity glow ring
      '<div style="width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,'+col+'22,transparent 70%);border:2px solid '+col+'66;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;animation:glowPulse 1.5s infinite">'+
        '<div style="font-size:3.5rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards">'+trophy.emoji+'</div>'+
      '</div>'+
      '<div style="font-family:Georgia,serif;color:'+col+';font-size:1.15rem;margin-bottom:.4rem;animation:popIn .4s .1s both">'+escapeHtml(trophy.name)+'</div>'+
      '<div style="font-size:.8rem;color:#c8a870;line-height:1.7;margin-bottom:.35rem;padding:0 1rem">'+escapeHtml(trophy.desc)+'</div>'+
      '<div style="font-size:.72rem;color:#5a4020;font-style:italic;margin-bottom:1.25rem;padding:0 1rem">'+escapeHtml(trophy.flavor)+'</div>'+
      (G.trophies[trophy.id]>1?'<div style="font-size:.7rem;color:'+col+';margin-bottom:.75rem">Duplicate ×'+G.trophies[trophy.id]+'</div>':'')+
      '<div style="display:flex;gap:.5rem;justify-content:center">'+
        '<button onclick="this.closest(\'[style*=fixed]\').remove();renderTrophyCabinet()" '+
          'style="background:#0e0b06;border:1px solid '+col+';border-radius:8px;padding:.65rem 1.25rem;color:'+col+';font-family:Georgia,serif;cursor:pointer;font-size:.85rem">'+
          'Add to cabinet'+
        '</button>'+
        '<button onclick="this.closest(\'[style*=fixed]\').remove();openChest(\''+chestId+'\')" '+
          'style="background:'+col+'22;border:1px solid '+col+';border-radius:8px;padding:.65rem 1.25rem;color:'+col+';font-family:Georgia,serif;cursor:pointer;font-size:.85rem">'+
          'Open another'+
        '</button>'+
      '</div>';
  },800);
}

function renderTrophyCabinet(){
  var trophies=G.trophies||{};
  var owned=TROPHIES.filter(function(t){return trophies[t.id]>0;});
  var total=TROPHIES.length;
  var remaining=total-owned.length;
  var pct=Math.round(owned.length/total*100);
  // Count by rarity remaining
  var byRarity={};
  [0,1,2,3,4].forEach(function(r){
    var ownedR=TROPHIES.filter(function(t){return t.rarity===r&&trophies[t.id]>0;}).length;
    var totalR=TROPHIES.filter(function(t){return t.rarity===r;}).length;
    byRarity[r]={owned:ownedR,total:totalR};
  });
  var html='<div class="topbar">'+
    '<button class="btn" onclick="renderBasement();goTo(\'s-basement\')">← Basement</button>'+
    '<div style="font-family:Georgia,serif;color:var(--gold);font-size:.9rem">Trophy Cabinet</div>'+
  '</div>'+
  '<div class="container">'+
    '<div style="font-size:.65rem;letter-spacing:.2em;color:#9c7a40;margin-bottom:.3rem">YOUR CABINET</div>'+
    '<h1 style="color:#c09860;margin-bottom:.5rem">Trophy Cabinet</h1>'+
    // Progress bar
    '<div style="background:#1a1408;border:1px solid #3a2a10;border-radius:8px;padding:.85rem;margin-bottom:1.25rem">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.4rem">'+
        '<div style="font-family:monospace;color:#c8a040;font-size:1.1rem;font-weight:700">'+owned.length+' / '+total+'</div>'+
        '<div style="font-size:.65rem;color:#5a4020">'+remaining+' still to find</div>'+
      '</div>'+
      '<div style="background:#0e0a04;border-radius:3px;height:6px;margin-bottom:.6rem">'+
        '<div style="background:linear-gradient(90deg,#8a6020,#d4a843);height:100%;border-radius:3px;width:'+pct+'%;transition:width .5s"></div>'+
      '</div>'+
      '<div style="display:flex;gap:.4rem;flex-wrap:wrap">'+
        [0,1,2,3,4].map(function(r){
          var col=RARITY_COLORS[r];
          var d=byRarity[r];
          return'<div style="flex:1;min-width:60px;text-align:center;background:#0e0a04;border:1px solid '+col+'33;border-radius:5px;padding:.3rem">'+
            '<div style="font-family:monospace;font-size:.75rem;color:'+col+'">'+d.owned+'/'+d.total+'</div>'+
            '<div style="font-size:.5rem;color:'+col+'88;letter-spacing:.08em">'+RARITY_NAMES[r].slice(0,4).toUpperCase()+'</div>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>';
  if(owned.length===0){
    html+='<div style="text-align:center;color:var(--ink-faded);padding:3rem 1rem;font-style:italic">The cabinet is empty. Open chests from the Safehouse to find trophies.</div>';
  } else {
    [4,3,2,1,0].forEach(function(rarity){
      var rarityTrophies=owned.filter(function(t){return t.rarity===rarity;});
      if(!rarityTrophies.length)return;
      var col=RARITY_COLORS[rarity];
      html+='<div style="font-size:.6rem;letter-spacing:.18em;color:'+col+';margin-bottom:.5rem;margin-top:1rem">'+RARITY_NAMES[rarity].toUpperCase()+'</div>'+
        '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.6rem;margin-bottom:.5rem">';
      rarityTrophies.forEach(function(t){
        var count=trophies[t.id]||1;
        var hasLore=!!TROPHY_LORE[t.id];
        html+='<div onclick="showTrophyDetail(\''+t.id+'\')" style="cursor:pointer;background:#1a1408;border:1px solid '+col+'44;border-radius:8px;padding:.85rem;text-align:center;transition:border-color .15s,background .15s;position:relative">'+
          (hasLore?'<div style="position:absolute;top:.4rem;right:.5rem;font-size:.5rem;color:'+col+';letter-spacing:.05em">READ ↗</div>':'')+
          '<div style="font-size:2rem;margin-bottom:.3rem">'+t.emoji+'</div>'+
          '<div style="font-family:Georgia,serif;color:'+col+';font-size:.82rem;margin-bottom:.2rem">'+escapeHtml(t.name)+'</div>'+
          '<div style="font-size:.68rem;color:#5a4020;line-height:1.5">'+escapeHtml(t.flavor)+'</div>'+
          (count>1?'<div style="font-size:.65rem;color:'+col+';margin-top:.3rem">×'+count+'</div>':'')+
        '</div>';
      });
      html+='</div>';
    });
  }
  // Open chest buttons
  html+='<div style="margin-top:1.5rem;font-size:.65rem;letter-spacing:.2em;color:#9c7a40;margin-bottom:.75rem">OPEN A CHEST</div>';
  TROPHY_CHESTS.forEach(function(chest){
    var canAfford=G.gold>=chest.cost;
    html+='<div class="card '+(canAfford?"card-clickable":"")+'" '+(canAfford?'onclick="openChest(\''+chest.id+'\')"':'')+' style="'+(canAfford?"":"opacity:.5;")+' margin-bottom:.5rem">'+
      '<div class="row-between">'+
        '<div>'+
          '<div style="color:'+chest.color+';font-size:.95rem">'+escapeHtml(chest.name)+'</div>'+
          '<div class="subtle" style="font-size:.78rem;margin-top:.1rem">'+escapeHtml(chest.desc)+'</div>'+
        '</div>'+
        '<div style="color:'+chest.color+';font-family:monospace;font-weight:bold;flex-shrink:0;margin-left:.75rem">'+chest.cost+'g</div>'+
      '</div>'+
    '</div>';
  });
  html+='</div>';
  $("s-journal").innerHTML=html; // reuse journal screen
  goTo("s-journal");
}
loadG();
checkStoryTriggers(); // in case first-load trigger fires
renderBasement();

// Show first story beat (the letter) if not seen
if(G.seenStoryBeats.indexOf("letter")<0){
  G.seenStoryBeats.push("letter");
  saveG();
  setTimeout(function(){showStoryBeat(STORY_BEATS[0]);},600);
}

// Wire up map hover after map renders
var _origRenderMap=renderMap;
renderMap=function(){
  _origRenderMap();
  setTimeout(initMapHover,50);
};

</script></body></html>
