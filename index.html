<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Codex</title>
<style>
/* ── BASE ── */
:root{
  --bg1:#0a0806;--bg2:#14110a;--bg3:#1a1510;--bg4:#211c14;
  --gold:#d4a843;--gold-soft:#c8a870;--ink:#e8d8b8;--ink-dim:#8a7850;--ink-faded:#5a4d38;
  --red:#9c4040;--green:#4a8c5c;--blue:#6088c0;--r:8px;
  /* Region palette — overridden when entering a region */
  --rg-bg1:var(--bg1);--rg-bg2:var(--bg2);--rg-accent:var(--gold);--rg-ink:var(--ink);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--rg-bg1);transition:background .6s}
body{background:transparent;color:var(--ink);font-family:Georgia,'Times New Roman',serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
.container{max-width:680px;margin:0 auto;padding:1rem 1.25rem 5rem}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:.65rem 1rem;background:rgba(10,8,6,.92);border-bottom:1px solid var(--bg4);position:sticky;top:0;z-index:20;backdrop-filter:blur(6px)}
h1,h2,h3{font-family:Georgia,serif;font-weight:normal}
h1{font-size:1.55rem;color:var(--rg-accent,var(--gold));margin-bottom:.5rem}
h2{font-size:1.2rem;color:var(--rg-accent,var(--gold));margin-bottom:.4rem}
h3{font-size:.98rem;color:var(--gold-soft);margin-bottom:.3rem}
.lore{color:var(--ink-dim);font-style:italic;line-height:1.75;font-size:.9rem}
/* Buttons */
.btn{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);padding:.7rem 1rem;color:var(--ink);font-family:inherit;font-size:.9rem;cursor:pointer;transition:border-color .15s,color .15s;display:inline-block;text-align:center;line-height:1.3}
.btn:hover:not(:disabled){border-color:var(--rg-accent,var(--gold));color:var(--rg-accent,var(--gold))}
.btn:active:not(:disabled){opacity:.8}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-full{display:block;width:100%}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-accent{border-color:var(--rg-accent,var(--gold));color:var(--rg-accent,var(--gold))}
.btn-red{border-color:var(--red);color:#d8a0a0}
.btn-green{border-color:var(--green);color:#a0d0a0}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}
/* Cards */
.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--r);padding:1rem 1.1rem;margin-bottom:.8rem}
.card-accent{border-color:var(--rg-accent,var(--gold))}
.card-red{border-color:var(--red)}
.card-clickable{cursor:pointer;transition:border-color .15s}
.card-clickable:hover{border-color:var(--rg-accent,var(--gold))}
/* Inputs */
input,textarea,select{background:var(--bg1);border:1px solid var(--bg4);border-radius:var(--r);color:var(--ink);font-family:inherit;font-size:1rem;padding:.55rem .8rem;width:100%}
textarea{min-height:90px;resize:vertical;line-height:1.55}
input:focus,textarea:focus{outline:none;border-color:var(--rg-accent,var(--gold))}
/* HUD */
.hud{display:flex;gap:.75rem;flex-wrap:wrap;font-size:.76rem;color:var(--ink-dim)}
.hud-stat{display:flex;flex-direction:column;align-items:center}
.hud-val{color:var(--gold);font-family:monospace;font-size:.92rem;font-weight:bold}
/* Progress bar */
.bar{background:var(--bg1);height:5px;border-radius:3px;overflow:hidden;margin-top:.3rem}
.bar-fill{background:var(--rg-accent,var(--gold));height:100%;transition:width .4s}
/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);border-radius:var(--r);padding:.55rem .95rem;color:var(--ink);font-size:.86rem;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1}
/* Misc */
.divider{height:1px;background:var(--bg4);margin:1rem 0}
.subtle{color:var(--ink-dim);font-size:.8rem}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.mastery-pill{font-family:monospace;font-size:.76rem;color:var(--rg-accent,var(--gold));background:var(--bg1);padding:.1rem .4rem;border-radius:4px}
.tag{display:inline-block;background:var(--bg3);border:1px solid var(--bg4);border-radius:4px;padding:.1rem .4rem;font-size:.68rem;color:var(--ink-dim);letter-spacing:.04em}
/* Synchronization overlay */
#sync-overlay{position:fixed;inset:0;background:#000;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;font-family:monospace}
#sync-overlay.show{opacity:1;pointer-events:all}
.sync-text{color:#3a3;font-size:.85rem;letter-spacing:.2em;margin:.25rem 0;opacity:0;transition:opacity .3s}
.sync-text.on{opacity:1}
/* Map pin — no CSS hover scale (causes oscillation); use SVG opacity instead */
.region-pin{cursor:pointer}
/* Region-themed bg gradients — applied to html element */
.rg-babylon{--rg-bg1:#0e0a04;--rg-accent:#c8882a;background:linear-gradient(160deg,#120c04 0%,#0e0a04 100%)}
.rg-athens{--rg-bg1:#060a0e;--rg-accent:#7ea0c0;background:linear-gradient(160deg,#06090e 0%,#050808 100%)}
.rg-manchester{--rg-bg1:#090908;--rg-accent:#c0a060;background:linear-gradient(160deg,#0c0b08 0%,#080808 100%)}
.rg-london{--rg-bg1:#080a0c;--rg-accent:#60a0b8;background:linear-gradient(160deg,#080c10 0%,#070809 100%)}
.rg-edo{--rg-bg1:#0a0808;--rg-accent:#c06060;background:linear-gradient(160deg,#0e0808 0%,#080606 100%)}
.rg-isfahan{--rg-bg1:#080810;--rg-accent:#9080d0;background:linear-gradient(160deg,#0a0812 0%,#070710 100%)}
.rg-florence{--rg-bg1:#0c0a06;--rg-accent:#c0a040;background:linear-gradient(160deg,#100c06 0%,#0a0804 100%)}
.rg-karnak{--rg-bg1:#100a04;--rg-accent:#d4a030;background:linear-gradient(160deg,#140c04 0%,#0e0804 100%)}
.rg-cavendish{--rg-bg1:#060c0a;--rg-accent:#50a880;background:linear-gradient(160deg,#061008 0%,#060a08 100%)}
.rg-arena{--rg-bg1:#0e0806;--rg-accent:#d0882a;background:linear-gradient(160deg,#120a04 0%,#0c0704 100%)}
.rg-none{--rg-bg1:#0a0806;--rg-accent:#d4a843;background:#0a0806}
</style>
</head>
<body class="rg-none">

<div id="s-basement" class="screen active"></div>
<div id="s-map" class="screen"></div>

<div id="sync-overlay">
  <div id="sync-line1" class="sync-text">MNEMOS SYNCHRONISATION PROTOCOL</div>
  <div id="sync-line2" class="sync-text">Locating ancestral resonance...</div>
  <div id="sync-line3" class="sync-text">Calibrating temporal index...</div>
  <div id="sync-line4" class="sync-text" style="color:#8a4;font-size:1rem;letter-spacing:.3em">SYNCHRONISED</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// WHEATLAND'S ANNOTATIONS — unlocked with Annotation Access upgrade
// Practical exam notes in Wheatland's voice. Keyed by def id.
// ═══════════════════════════════════════════════════════
var ANNOTATIONS={
  // 1.1 Basic Physics
  0:"A quantity needs both number AND unit -- examiners will mark you down if you just write a number. Don't forget the unit.",
  1:"A scalar has magnitude only. Speed, distance, mass, temperature, energy. Memorise this list. Vector = scalar + direction.",
  2:"A vector has magnitude AND direction. Force, velocity, displacement, momentum, acceleration. If it has an arrow, it's a vector.",
  3:"'Resolving' means splitting one vector into two perpendicular components. The components add back together vectorially to give the original. This comes up constantly in mechanics questions.",
  4:"Density = mass / volume. For any sample -- the density is a material property, not a sample property. Water is always 1000 kg/m3 regardless of how much you have.",
  5:"Moment = force x perpendicular distance to line of action. The word 'perpendicular' is doing a lot of work here. Don't just use any distance.",
  6:"For equilibrium: sum of clockwise moments = sum of anticlockwise moments, about ANY point. You can pick whichever point makes the maths easiest.",
  7:"Centre of gravity -- the SINGLE point where the ENTIRE weight acts. Not the centre of mass (though they're often the same). Weight is the key word.",
  // 1.2 Kinematics
  8:"Displacement = shortest distance + direction. Not total distance -- shortest distance. Walking 3km in a circle has displacement zero.",
  9:"Mean speed = total distance / total time. Mean -- not instantaneous. Total distance, not displacement.",
  10:"Instantaneous speed = rate of change of distance. The speedometer reading at one moment.",
  11:"Mean velocity = total displacement / total time. Displacement not distance. This is a vector.",
  12:"Velocity = rate of change of displacement. Vector. This is what the gradient of a displacement-time graph gives you.",
  13:"Mean acceleration = change in velocity / time. Delta v over t. Not change in speed -- change in velocity.",
  14:"Instantaneous acceleration = rate of change of velocity. The gradient of a v-t graph at a point.",
  15:"Terminal velocity: constant, maximum, when resistive forces EQUAL and OPPOSITE the accelerating force. Three things to say: constant, maximum, force balance.",
  // 1.3 Dynamics
  16:"A force is a push or pull from an EXTERNAL body. The word 'external' matters -- internal forces don't produce net acceleration.",
  17:"Newton's 3rd: A on B and B on A. Equal magnitude, opposite direction, SAME type of force, DIFFERENT objects. Exam trap: the forces act on different bodies.",
  18:"F=ma. But the full definition includes 'vector sum' (resultant) of forces. Don't just write 'the net force equals mass times acceleration.'",
  19:"Momentum = mass x velocity. Vector. SI unit: kg m/s. p = mv. This is a key definition -- learn it cold.",
  20:"Newton's 2nd: rate of change of momentum is proportional to resultant force, in the direction of that force. NOT just F=ma -- that's only valid for constant mass.",
  21:"Conservation of momentum: total momentum constant, IF no external resultant force. The condition is critical. Always state it.",
  22:"Elastic collision: no change in total KE. Both momentum AND kinetic energy conserved. Perfectly elastic collisions are theoretical.",
  23:"Inelastic: KE is lost. Not 'energy is lost' -- energy is conserved overall. KE specifically is lost, usually to heat/sound/deformation.",
  // 1.4 Energy
  24:"Work = force x distance IN THE DIRECTION OF THE FORCE. If force and displacement are at an angle, use W = Fd cos theta.",
  25:"Conservation of energy: cannot be created or destroyed. Note it's a SCALAR -- direction doesn't matter for energy.",
  26:"Potential energy: energy by virtue of POSITION. Gravitational PE = mgh. The position relative to some reference level.",
  27:"Kinetic energy: energy by virtue of MOTION. KE = 1/2 mv^2. Motion, not position.",
  28:"Elastic PE: energy by virtue of DEFORMATION due to forces. A compressed spring, a stretched rubber band.",
  29:"Energy of a body = amount of work it CAN DO. This is the definition. Energy is the capacity to do work.",
  30:"Power = work done per second = energy transferred per second. P = W/t. Watts = joules per second.",
  // 1.5 Circular Motion
  31:"Period = time for ONE COMPLETE circuit. T is always in seconds. f = 1/T.",
  32:"Frequency = circuits per second. Hertz. 1 Hz = 1 revolution per second. Exam trap: don't confuse with angular velocity.",
  33:"Radian: arc length = radius when angle = 1 radian. 2pi radians = 360 degrees. Pi radians = 180 degrees.",
  34:"Angular velocity omega = angle swept per unit time. omega = 2*pi*f = 2*pi/T. Units: rad/s.",
  // 1.6 SHM
  35:"SHM: acceleration toward fixed point, proportional to distance. The word 'toward' is essential -- this is what makes it oscillatory. If it were 'away from', the particle would never return.",
  36:"Period of oscillation = time for ONE COMPLETE CYCLE. Same definition structure as circular motion period.",
  37:"Amplitude = maximum displacement from EQUILIBRIUM position. Not from one extreme to the other (that's 2A).",
  38:"Phase is the angle omega*t + epsilon. Gives you the position in the cycle at any time. Phase DIFFERENCE between two oscillations is what you usually need.",
  39:"Frequency for oscillation = number of oscillations per second. f = 1/T. Same as circular motion.",
  40:"Free oscillations: displaced, released, left alone. No driving force. Natural frequency only.",
  41:"Damping = dying away of amplitude due to RESISTIVE FORCES. Energy is removed from the system each cycle.",
  42:"Critical damping: just enough resistance to prevent oscillation. Returns to equilibrium fastest without oscillating. Car suspension aims for this.",
  43:"Forced oscillations: external sinusoidal driving force applied. System oscillates at the DRIVING frequency, not its natural frequency.",
  44:"Resonance: driving frequency = natural frequency. Amplitude becomes very large. The Tacoma Narrows bridge is the classic example.",
  // 1.7 Ideal Gas
  45:"Ideal gas obeys pV = nRT EXACTLY. Real gases only approximate this. n = moles, T = kelvin (ALWAYS kelvin), R = 8.31 J/mol/K.",
  46:"The mole: the amount containing as many particles as there are atoms in 12g of carbon-12. That's Avogadro's number (6.02 x 10^23) of particles.",
  47:"Avogadro constant = number of particles PER MOLE. About 6.02 x 10^23 per mole. Always per mole.",
  // 1.8 Thermodynamics
  48:"Internal energy = sum of KE + PE of ALL particles. For an ideal gas, PE between molecules is zero, so internal energy is purely kinetic.",
  49:"Heat = energy flow due to temperature DIFFERENCE. Heat is NOT a property of a body -- it's a transfer. You can't say 'the heat in a body.'",
  50:"Work done BY a gas = p * delta V. By the gas -- positive when gas expands. Done ON the gas is negative delta V.",
  51:"First law: delta U = Q - W. Increase in internal energy = heat IN minus work done BY system. Sign convention is crucial here.",
  52:"Specific heat capacity: heat per kg per kelvin to raise temperature. c = Q / (m * delta T). Units: J kg-1 K-1.",
  // 2.1 Conduction
  53:"Electric current = rate of flow of charge. I = dQ/dt = Q/t. SI unit: ampere. Charge = current x time.",
  54:"Efficiency = (useful output / total input) x 100%. Always ask what counts as 'useful' for the context.",
  // 2.2 Resistance
  55:"PD = energy converted FROM electrical PE per coulomb. This direction matters -- it's the energy converted, not the energy gained.",
  56:"Ohm's law: I proportional to V at CONSTANT TEMPERATURE. The constant temperature condition is what makes it Ohm's law. Temperature change = resistance change = not Ohm's law.",
  57:"Resistance R = V/I. Defined from V and I. Always V/I not I/V. Units: ohms (omega).",
  58:"Resistivity rho = R * A / L. A material property at constant temperature. Units: ohm-metres. Used to compare materials, not components.",
  59:"Superconducting transition temperature: cooled to this, resistance drops to ZERO. Not nearly zero -- zero. Different physics from normal conduction.",
  // 2.3 DC Circuits
  60:"Conservation of charge: charge cannot pile up at a junction. This gives Kirchhoff's Current Law: sum of currents in = sum of currents out.",
  61:"EMF: energy converted FROM other forms TO electrical PE per coulomb through the SOURCE. EMF is about the source, PD is about the external circuit.",
  // 2.4 Capacitance
  62:"Capacitor = pair of conducting plates separated by insulator. Equal and OPPOSITE charges on the plates -- not equal charges.",
  63:"Capacitance C = Q/V. Charge per unit PD. Units: farads. The Q is the charge on EITHER plate.",
  64:"Dielectric: insulator between plates that makes capacitance LARGER. The electric field polarises the dielectric molecules, reducing the field and increasing capacitance.",
  // 2.5 Solids
  65:"Hooke's law: tension proportional to extension, provided extension is NOT TOO GREAT. The limit is important -- beyond elastic limit, Hooke's law no longer holds.",
  66:"Spring constant k = F/extension. Units: N/m. Steeper gradient on F-x graph = stiffer spring = higher k.",
  67:"Stress = F/A. Force per unit cross-sectional area. Units: Pa (pascals) = N/m^2. Same units as pressure.",
  68:"Strain = extension/original length. Dimensionless -- no units. Fractional extension.",
  69:"Young modulus E = stress/strain. Units: Pa. E = FL / (A * delta L). Defined in the Hooke's law region.",
  70:"Crystal: atoms in REGULAR array with LONG RANGE ORDER. The regular arrangement extends throughout the whole crystal.",
  71:"Crystalline solid: made of one crystal or many (polycrystalline). Metals are typically polycrystalline.",
  72:"Amorphous: no long range order. Glass, brick. The arrangement is irregular over distances of more than a few atoms.",
  73:"Polymeric: chain-like molecules. Rubber, plastics. The chains can be tangled or aligned.",
  74:"Ductile: can be drawn into wire. Requires plastic strain. Copper is very ductile. Glass is not.",
  75:"Elastic strain: disappears when stress removed. Returns to original shape. Springs, elastic bands (up to a point).",
  76:"Plastic strain: remains when stress removed. Permanent deformation. Bending a paperclip.",
  77:"Elastic limit: where deformation stops being elastic. Beyond this, plastic deformation occurs. Different from the limit of proportionality.",
  78:"Dislocations: faults in crystals that REDUCE the stress needed for planes to slide. This is why metals are easier to deform than expected from perfect crystal theory.",
  79:"Grain boundaries: where crystal grains meet in polycrystalline materials. Impede dislocation movement -- make material stronger.",
  80:"Ductile fracture (necking): local thinning INCREASES stress locally, which causes more thinning. Positive feedback leads to fracture.",
  81:"Brittle material: no plastic region. Fails suddenly without warning. Glass, ceramics, cast iron.",
  82:"Brittle fracture: crack propagation under tension. Once a crack starts, stress concentrates at the tip and the crack propagates rapidly.",
  83:"Elastic hysteresis: stress-strain graphs for loading and unloading don't coincide. The area of the loop = energy dissipated per cycle as heat.",
  // 2.6 Fields
  84:"Newton's law of gravitation: F proportional to m1*m2 and inversely proportional to r^2. Both masses matter -- the force on each is the same (Newton's 3rd).",
  85:"Coulomb's law: F proportional to q1*q2 / r^2. Same structure as gravity but for charges. Can be attractive OR repulsive.",
  86:"Electric field strength E = F/q. Force per unit POSITIVE charge. A vector -- direction is the direction of force on a positive charge.",
  87:"Gravitational field strength g = F/m. Force per unit mass. At Earth's surface = 9.81 N/kg. Also equals the acceleration due to gravity.",
  88:"Electric potential V = work done / charge, bringing positive charge from infinity. Scalar. Units: volts = J/C.",
  89:"Gravitational potential = work done per unit mass from infinity. Negative everywhere -- gravity is attractive. Zero at infinity.",
  // 2.7 Stars
  90:"Black body: perfect absorber of ALL radiation. Perfect emitter too. The Sun approximates a black body. Used as an idealised model.",
  91:"Wien's law: wavelength of peak emission inversely proportional to T. Hotter stars = peak at shorter wavelength = bluer. Cooler = redder.",
  92:"Absolute temperature: 0K = -273.15 C. Lowest possible energy. Temperature in K always = temperature in C + 273.",
  93:"Stefan's law: P = A * sigma * T^4. Power proportional to FOURTH POWER of temperature. Small increase in T = large increase in power.",
  94:"Luminosity = total energy emitted per unit time. The total power output of a star across all wavelengths.",
  95:"Intensity = power per unit area. Follows inverse square law: I = L / (4*pi*r^2). Intensity drops as 1/r^2.",
  // 2.8 Cosmology
  96:"Kepler's 1st: ellipses, Sun at one FOCUS. Not the centre -- the focus. The other focus is empty.",
  97:"Kepler's 2nd: equal areas in equal times. Means planets move FASTER when closer to the Sun.",
  98:"Kepler's 3rd: T^2 proportional to r^3. Where r is the semi-major axis. This holds for all planets around the same star.",
  99:"Dark matter: inferred from gravitational effects only. We cannot detect it by any electromagnetic radiation. Makes up about 27% of the universe.",
  100:"Radial velocity: the component ALONG the line of sight. What Doppler shift measures. Not the total velocity.",
  101:"Galactic radial velocity: MEAN component along line of sight. For a whole galaxy, not a single star.",
  // 3.1 Waves
  102:"Progressive wave: pattern of disturbances CARRYING ENERGY. Particles oscillate about equilibrium but don't travel with the wave.",
  103:"Transverse: oscillations at RIGHT ANGLES to direction of travel. Light, water waves, waves on strings. Can be polarised.",
  104:"Longitudinal: oscillations PARALLEL to direction of travel. Sound, P-waves. Cannot be polarised.",
  105:"Polarised wave: transverse wave where oscillations are in ONE direction only. Polarised light oscillates in one plane.",
  106:"In phase: same frequency, same point in cycle at same time. Phase difference = 0 or 2*pi.",
  107:"Wavelength = minimum distance between points oscillating in phase. Minimum -- between adjacent in-phase points.",
  108:"Frequency of a wave = number of cycles past a point per second. f = v / lambda.",
  109:"Wave speed = distance the PROFILE moves per unit time. v = f * lambda. The profile, not the particles.",
  // 3.2 Wave properties
  110:"Diffraction: spreading into GEOMETRICAL SHADOWS. Maximum diffraction when gap size = wavelength.",
  111:"Superposition: total displacement = vector sum of individual displacements. Vector sum -- direction matters for displacements.",
  112:"Phase difference: difference in position within a cycle. Can be expressed as fraction of cycle, angle in degrees, or radians.",
  113:"Coherence: constant phase difference + same frequency. Laser light is coherent. Two separate light bulbs are not.",
  114:"Stationary wave: energy not propagated. Nodes (zero amplitude) and antinodes (maximum). Formed by two waves of same frequency travelling in opposite directions.",
  // 3.3 Refraction
  115:"Refractive index n: n1*sin(theta1) = n2*sin(theta2). Defined by Snell's law. n = 1 for vacuum by convention.",
  116:"Snell's law: ratio of sines is constant at a boundary. n = sin(i) / sin(r) for air to medium.",
  117:"Critical angle: largest angle of incidence for which refraction can occur. At critical angle, refracted ray travels along the boundary (90 to normal).",
  // 3.4 Photons
  118:"Photoelectric effect: light ejects electrons from a surface. Only works if frequency exceeds threshold -- intensity doesn't matter for individual electrons.",
  119:"Work function: MINIMUM energy to remove electron from surface. Phi = h * f_threshold. The electron must have at least this energy.",
  120:"Electron volt: energy when electron moves through 1V PD. 1 eV = 1.6 x 10^-19 J. Useful unit for atomic/nuclear energies.",
  121:"Ionisation: removal of one or more electrons. Creates an ion. Requires energy equal to or greater than ionisation energy.",
  122:"Ionisation energy: MINIMUM energy to remove electron from GROUND STATE. From ground state -- if already excited, less energy needed.",
  // 3.5 Lasers
  123:"Stimulated emission: passing photon triggers emission of IDENTICAL photon from excited atom. Same frequency, phase, direction, polarisation. This is how lasers amplify.",
  124:"Population inversion: MORE atoms in higher energy state than lower. Required for lasing. Normally, lower states are more populated.",
  125:"Pumping: feeding energy to create population inversion. Can be optical pumping (with light) or electrical pumping.",
  // 3.6 Radioactivity
  126:"Alpha: helium nuclei (2p + 2n). Slow, heavy, strongly ionising, stopped by paper. Range in air: a few cm.",
  127:"Beta: fast electrons from nucleus. Medium ionising. Stopped by a few mm of aluminium.",
  128:"Gamma: high-energy photons. Weakly ionising. Never fully stopped, only attenuated. Needs lead or thick concrete.",
  129:"AZX notation: A = mass number (p + n), Z = atomic number (protons only), X = element symbol.",
  130:"Half-life: time for activity (or number of nuclei) to halve. A constant for each nuclide -- doesn't depend on how much you have.",
  131:"Activity: number of disintegrations per SECOND. Unit: becquerel (Bq). A = lambda * N.",
  132:"Decay constant lambda: appears in N = N0 * e^(-lambda*t). Greater lambda = faster decay = shorter half-life. lambda = ln2 / t_half.",
  // 3.7 Particles
  133:"Leptons: electrons, neutrinos, muons, taus and their neutrinos. Do not feel the strong force. Fundamental -- no internal structure.",
  134:"Hadrons: made of quarks. Feel the strong force. Protons and neutrons are hadrons.",
  135:"Baryon: 3 quarks. Protons (uud) and neutrons (udd) are baryons. Baryon number is conserved.",
  136:"Meson: quark-antiquark pair. Pions are mesons. Unstable -- decay quickly.",
  // 3.8 Nuclear
  137:"Unified atomic mass unit u: exactly 1/12 of a carbon-12 atom mass. About 1.66 x 10^-27 kg.",
  138:"Binding energy: energy needed to SEPARATE nucleus into individual nucleons. Greater binding energy per nucleon = more stable nucleus.",
  139:"Conservation of mass-energy: E = mc^2. Mass and energy are equivalent. Nuclear reactions convert mass to energy (or vice versa).",
  // 3.9 Magnetic
  140:"Magnetic flux density B = F / (IL). Force per unit current per unit length. Direction: right-hand rule or Fleming's left-hand rule.",
  141:"Hall voltage: appears at right angles to both B and I. Used to measure B-field strength and determine charge carrier type.",
  // 3.10 EM Induction
  142:"Magnetic flux Phi = BA*cos(theta). Where theta is the angle between B and the NORMAL to the coil plane.",
  143:"Flux linkage = N * Phi. For a coil of N turns. This is what Faraday's law uses.",
  144:"Faraday's law: induced EMF = rate of change of flux linkage. EMF = -d(N*Phi)/dt. The minus sign is Lenz's law.",
  145:"Lenz's law: induced current OPPOSES the change causing it. Conservation of energy -- if it aided the change, you'd get energy for free.",
  // Option C
  146:"Coefficient of restitution e = relative speed after / relative speed before. e = 1 (elastic), e = 0 (perfectly inelastic). 0 <= e <= 1.",
  147:"Moment of inertia I = sum(m*r^2). Larger r = much larger I. This is why figure skaters spin faster when arms are pulled in.",
  148:"Angular acceleration alpha = rate of change of angular velocity. alpha = d(omega)/dt. Analogous to linear acceleration.",
  149:"Torque = I * alpha = rate of change of angular momentum. The rotational equivalent of force = ma.",
  150:"Angular momentum L = I * omega. Conserved when no external torque. This is why spinning tops stay upright.",
  151:"Conservation of angular momentum: no external torque = constant L. Explains planetary orbits, spinning ice skaters, gyroscopes.",
  152:"Bernoulli: pressure = static pressure - (1/2)*rho*v^2. Faster flow = lower pressure. Explains lift, curve ball, etc.",
  153:"Drag coefficient Cd: dimensionless. Higher = more drag. Depends on shape, not size. A streamlined shape has lower Cd."

var STREAK={current:0,best:0};

function streakMultiplier(){
  if(STREAK.current>=7)return 2.0;
  if(STREAK.current>=5)return 1.75;
  if(STREAK.current>=3)return 1.5;
  return 1.0;
}
function streakLabel(){
  if(STREAK.current>=7)return"🔥 x7 streak — 2× gold";
  if(STREAK.current>=5)return"🔥 x"+STREAK.current+" streak — 1.75× gold";
  if(STREAK.current>=3)return"🔥 x"+STREAK.current+" streak — 1.5× gold";
  if(STREAK.current>0)return"✦ "+STREAK.current+" in a row";
  return"";
}
function streakHit(){
  STREAK.current++;
  if(STREAK.current>STREAK.best)STREAK.best=STREAK.current;
}
function streakMiss(){STREAK.current=0;}

var DEFS=[
// ═══ 1.1 BASIC PHYSICS ═══
{id:0,topic:"1.1",term:"Quantity",keys:["number","unit"],def:"In SI a quantity is represented by a number multiplied by a unit."},
{id:1,topic:"1.1",term:"Scalar",keys:["magnitude only"],def:"A scalar is a quantity that has magnitude only."},
{id:2,topic:"1.1",term:"Vector",keys:["magnitude","direction"],def:"A vector is a quantity that has magnitude and direction."},
{id:3,topic:"1.1",term:"Resolving a vector",keys:["finding vectors","components","add together vectorially","equivalent"],def:"Resolving a vector into components in particular directions means finding vectors (the components) in those directions, which add together vectorially to make the original vector, and so together are equivalent to it."},
{id:4,topic:"1.1",term:"Density",keys:["mass","volume","sample","material"],def:"The density of a material is its mass divided by its volume, in which mass and volume apply to any sample of the material."},
{id:5,topic:"1.1",term:"Moment of a force",keys:["force","perpendicular distance","line of action","point"],def:"The moment (or torque) of a force about a point is defined as the force multiplied by the perpendicular distance from the point to the line of action of the force."},
{id:6,topic:"1.1",term:"Principle of moments",keys:["equilibrium","anticlockwise","clockwise","same point"],def:"For a system to be in equilibrium, the sum of anticlockwise moments about a point equals the sum of clockwise moments about the same point."},
{id:7,topic:"1.1",term:"Centre of gravity",keys:["single point","body","entire weight","considered to act"],def:"The centre of gravity is the single point within a body at which the entire weight of the body may be considered to act."},

// ═══ 1.2 KINEMATICS ═══
{id:8,topic:"1.2",term:"Displacement",keys:["shortest distance","direction"],def:"The displacement of a point B from a point A is the shortest distance from A to B together with the direction."},
{id:9,topic:"1.2",term:"Mean speed",keys:["total distance","total time"],def:"Mean speed is the total distance travelled divided by the total time taken."},
{id:10,topic:"1.2",term:"Instantaneous speed",keys:["rate of change","distance"],def:"Instantaneous speed is the rate of change of distance."},
{id:11,topic:"1.2",term:"Mean velocity",keys:["total displacement","total time"],def:"Mean velocity is the total displacement divided by the total time taken."},
{id:12,topic:"1.2",term:"Instantaneous velocity",keys:["rate of change","displacement"],def:"The velocity of a body is the rate of change of displacement."},
{id:13,topic:"1.2",term:"Mean acceleration",keys:["change in velocity","time taken"],def:"Mean acceleration is the change in velocity divided by the time taken."},
{id:14,topic:"1.2",term:"Instantaneous acceleration",keys:["rate of change","velocity"],def:"The instantaneous acceleration of a body is its rate of change of velocity."},
{id:15,topic:"1.2",term:"Terminal velocity",keys:["constant","maximum velocity","resistive forces","equal","opposite","accelerating force"],def:"The terminal velocity is the constant maximum velocity of an object when the resistive forces on it are equal and opposite to the accelerating force."},

// ═══ 1.3 DYNAMICS ═══
{id:16,topic:"1.3",term:"Force",keys:["push","pull","external body"],def:"A force on a body is a push or a pull acting on the body from some external body."},
{id:17,topic:"1.3",term:"Newton's third law",keys:["body A","body B","equal","opposite force"],def:"If a body A exerts a force on a body B, then B exerts an equal and opposite force on A."},
{id:18,topic:"1.3",term:"Sum of F equals ma",keys:["mass","acceleration","vector sum","forces","resultant"],def:"The mass of a body multiplied by its acceleration is equal to the vector sum of the forces acting on the body. This vector sum is called the resultant force."},
{id:19,topic:"1.3",term:"Momentum",keys:["mass","multiplied","velocity","vector"],def:"The momentum of an object is its mass multiplied by its velocity. It is a vector."},
{id:20,topic:"1.3",term:"Newton's second law",keys:["rate of change","momentum","proportional","resultant force","direction"],def:"The rate of change of momentum of an object is proportional to the resultant force acting on it, and takes place in the direction of that force."},
{id:21,topic:"1.3",term:"Conservation of momentum",keys:["vector sum","momenta","constant","no external","resultant force"],def:"The vector sum of the momenta of bodies in a system stays constant even if forces act between the bodies, provided there is no external resultant force."},
{id:22,topic:"1.3",term:"Elastic collision",keys:["no change","total kinetic energy"],def:"An elastic collision is a collision in which there is no change in total kinetic energy."},
{id:23,topic:"1.3",term:"Inelastic collision",keys:["kinetic energy","lost"],def:"An inelastic collision is a collision in which kinetic energy is lost."},

// ═══ 1.4 ENERGY ═══
{id:24,topic:"1.4",term:"Work",keys:["force","distance","direction of the force"],def:"Work done by a force is the product of the magnitude of the force and the distance moved in the direction of the force."},
{id:25,topic:"1.4",term:"Conservation of energy",keys:["cannot be created","destroyed","transferred","scalar"],def:"Energy cannot be created or destroyed, only transferred from one form to another. Energy is a scalar."},
{id:26,topic:"1.4",term:"Potential energy",keys:["energy possessed","virtue","position"],def:"Potential energy is energy possessed by an object by virtue of its position."},
{id:27,topic:"1.4",term:"Kinetic energy",keys:["energy possessed","virtue","motion"],def:"Kinetic energy is energy possessed by an object by virtue of its motion."},
{id:28,topic:"1.4",term:"Elastic potential energy",keys:["energy possessed","deformed","forces acting"],def:"Elastic potential energy is the energy possessed by an object when it has been deformed due to forces acting on it."},
{id:29,topic:"1.4",term:"Energy",keys:["body","system","amount of work","can do"],def:"The energy of a body or system is the amount of work it can do."},
{id:30,topic:"1.4",term:"Power",keys:["work done","per second","energy transferred"],def:"Power is the work done per second, or energy transferred per second."},

// ═══ 1.5 CIRCULAR MOTION ═══
{id:31,topic:"1.5",term:"Period for circular motion",keys:["time taken","one complete circuit"],def:"The period for a point describing a circle is the time taken for one complete circuit."},
{id:32,topic:"1.5",term:"Frequency for circular motion",keys:["circuits","cycles","per second"],def:"The frequency is the number of circuits or cycles per second."},
{id:33,topic:"1.5",term:"Radian",keys:["unit","angle","centre","arc","radius"],def:"A radian is a unit of measurement of angles, equivalent to the angle subtended at the centre of a circle by an arc equal in length to the radius."},
{id:34,topic:"1.5",term:"Angular velocity",keys:["angle","swept out","radius","time","divided"],def:"For an object describing a circle at uniform speed, the angular velocity is equal to the angle swept out by the radius in time t divided by t."},

// ═══ 1.6 SHM ═══
{id:35,topic:"1.6",term:"Simple harmonic motion",keys:["acceleration","directed toward","fixed point","proportional","distance"],def:"Simple harmonic motion occurs when an object moves such that its acceleration is always directed toward a fixed point and is proportional to its distance from the fixed point."},
{id:36,topic:"1.6",term:"Period for an oscillating body",keys:["time taken","one complete cycle"],def:"The period for an oscillating body is the time taken for one complete cycle."},
{id:37,topic:"1.6",term:"Amplitude",keys:["maximum","displacement","equilibrium position"],def:"The amplitude of an oscillating object is the maximum value of the object's displacement from its equilibrium position."},
{id:38,topic:"1.6",term:"Phase",keys:["angle","ωt plus ε","oscillation"],def:"The phase of an oscillation is the angle ωt+ε in the equation x equals A sin(ωt+ε)."},
{id:39,topic:"1.6",term:"Frequency for oscillation",keys:["number of oscillations","per second"],def:"The frequency for oscillation is the number of oscillations per second."},
{id:40,topic:"1.6",term:"Free oscillations",keys:["oscillatory system","displaced","released"],def:"Free oscillations occur when an oscillatory system, such as a mass on a spring or a pendulum, is displaced and released."},
{id:41,topic:"1.6",term:"Damping",keys:["dying away","resistive forces","amplitude","free oscillations"],def:"Damping is the dying away, due to resistive forces, of the amplitude of free oscillations."},
{id:42,topic:"1.6",term:"Critical damping",keys:["resistive forces","just large enough","prevent oscillations","displaced","released"],def:"Critical damping is the case when the resistive forces on the system are just large enough to prevent oscillations occurring at all when the system is displaced and released."},
{id:43,topic:"1.6",term:"Forced oscillations",keys:["sinusoidally varying","driving force","applied","oscillate","frequency","applied force"],def:"Forced oscillations occur when a sinusoidally varying driving force is applied to an oscillatory system, causing it to oscillate with the frequency of the applied force."},
{id:44,topic:"1.6",term:"Resonance",keys:["forced vibrations","frequency","applied force","equal","natural frequency","amplitude","large"],def:"Resonance occurs when, in forced vibrations, the frequency of the applied force is equal to the natural frequency of the system, and the amplitude of the resulting oscillations is large."},

// ═══ 1.7 IDEAL GAS ═══
{id:45,topic:"1.7",term:"Ideal gas",keys:["obeys","equation of state","pV equals nRT","moles","kelvin","molar gas constant"],def:"An ideal gas strictly obeys the equation of state pV=nRT, in which n is the number of moles, T is the kelvin temperature and R is the molar gas constant."},
{id:46,topic:"1.7",term:"The mole",keys:["SI unit","amount of substance","particles","atoms","12 g","carbon-12"],def:"The mole is the SI unit of an amount of substance. It is the amount containing as many particles as there are atoms in 12 g of carbon-12."},
{id:47,topic:"1.7",term:"Avogadro constant",keys:["number of particles","per mole"],def:"The Avogadro constant is the number of particles per mole."},

// ═══ 1.8 THERMODYNAMICS ═══
{id:48,topic:"1.8",term:"Internal energy",keys:["sum","kinetic","potential","particles","system"],def:"The internal energy of a system is the sum of the kinetic and potential energies of the particles of a system."},
{id:49,topic:"1.8",term:"Heat",keys:["energy flow","higher temperature","lower temperature","temperature difference"],def:"Heat is energy flow from a region at higher temperature to a region at lower temperature, due to the temperature difference."},
{id:50,topic:"1.8",term:"Work done by a gas",keys:["gas","piston","pressure","pushes","volume increases"],def:"If the system is a gas in a cylinder fitted with a piston, the gas does work of amount p multiplied by ΔV when it exerts a pressure p and pushes the piston out a small way, so the gas volume increases by ΔV."},
{id:51,topic:"1.8",term:"First law of thermodynamics",keys:["increase","internal energy","heat entering","work done by","system"],def:"The increase in internal energy of a system is ΔU equals Q minus W, in which Q is the heat entering the system and W is the work done by the system."},
{id:52,topic:"1.8",term:"Specific heat capacity",keys:["heat required","per kilogram","per degree","raise the temperature","substance"],def:"Specific heat capacity is the heat required per kilogram per degree celsius or kelvin to raise the temperature of a substance."},

// ═══ 2.1 CONDUCTION ═══
{id:53,topic:"2.1",term:"Electric current",keys:["rate of flow","electric charge"],def:"Electric current is the rate of flow of electric charge."},
{id:54,topic:"2.1",term:"Efficiency of a system",keys:["100","useful","work","energy out","work","energy put in"],def:"The percentage efficiency of a system is 100 multiplied by the useful work or energy out divided by the work or energy put in."},

// ═══ 2.2 RESISTANCE ═══
{id:55,topic:"2.2",term:"Potential difference",keys:["energy converted","electrical potential energy","per coulomb","charge flowing"],def:"The potential difference between two points is the energy converted from electrical potential energy to some other form per coulomb of charge flowing from one point to the other."},
{id:56,topic:"2.2",term:"Ohm's law",keys:["current","metal wire","constant temperature","proportional","potential difference"],def:"The current in a metal wire at constant temperature is proportional to the potential difference across it."},
{id:57,topic:"2.2",term:"Electrical resistance",keys:["potential difference","conductor","divided","current"],def:"The resistance of a conductor is the potential difference placed across it divided by the resulting current through it."},
{id:58,topic:"2.2",term:"Resistivity",keys:["resistance","length","cross-sectional area","constant","material","constant temperature"],def:"The resistivity is a constant, at constant temperature, for the material of a wire, equal to the resistance multiplied by the cross-sectional area divided by the length."},
{id:59,topic:"2.2",term:"Superconducting transition temperature",keys:["temperature","cooled","loses","electrical resistance","super-conducting"],def:"The superconducting transition temperature is the temperature at which a material, when cooled, loses all its electrical resistance and becomes super-conducting."},

// ═══ 2.3 D.C. CIRCUITS ═══
{id:60,topic:"2.3",term:"Conservation of charge",keys:["cannot be created","destroyed","cannot pile up","point in a circuit"],def:"Electric charge cannot be created or destroyed, though positive and negative charges can neutralise each other. Charge cannot pile up at a point in a circuit."},
{id:61,topic:"2.3",term:"Emf",keys:["energy converted","some other form","electrical potential energy","per coulomb","charge flowing","through the source"],def:"The emf of a source is the energy converted from some other form to electrical potential energy per coulomb of charge flowing through the source."},

// ═══ 2.4 CAPACITANCE ═══
{id:62,topic:"2.4",term:"Capacitor",keys:["pair","conducting plates","separated","insulator","equal","opposite charges"],def:"A capacitor is a pair of conducting plates separated by an insulator. If a potential difference is placed across the plates, they acquire equal and opposite charges."},
{id:63,topic:"2.4",term:"Capacitance",keys:["charge","either plate","divided","potential difference","plates"],def:"Capacitance is the charge on either plate divided by the potential difference between the plates."},
{id:64,topic:"2.4",term:"Dielectric",keys:["insulator","plates","capacitor","capacitance larger","empty space"],def:"A dielectric is an insulator between the plates of a capacitor, also serving to make the capacitance larger than if there were just empty space."},

// ═══ 2.5 SOLIDS UNDER STRESS ═══
{id:65,topic:"2.5",term:"Hooke's law",keys:["tension","spring","wire","proportional","extension","natural length","not too great"],def:"The tension in a spring or wire is proportional to its extension from its natural length, provided the extension is not too great."},
{id:66,topic:"2.5",term:"Spring constant",keys:["force","per unit","extension"],def:"The spring constant is the force per unit extension."},
{id:67,topic:"2.5",term:"Stress",keys:["force","per unit","cross-sectional area","equal opposing forces"],def:"Stress is the force per unit cross-sectional area when equal opposing forces act on a body."},
{id:68,topic:"2.5",term:"Strain",keys:["extension","per unit","length","applied stress"],def:"Strain is the extension per unit length due to an applied stress."},
{id:69,topic:"2.5",term:"Young modulus",keys:["tensile stress","tensile strain","Hooke's law region"],def:"The Young modulus is the tensile stress divided by the tensile strain. Unless otherwise indicated, this is defined for the Hooke's law region."},
{id:70,topic:"2.5",term:"Crystal",keys:["atoms","regular array","long range order"],def:"A crystal is a solid in which atoms are arranged in a regular array. There is a long range order within crystal structures."},
{id:71,topic:"2.5",term:"Crystalline solid",keys:["consisting","crystal","many crystals","randomly","polycrystalline"],def:"A crystalline solid is a solid consisting of a crystal, or of many crystals usually arranged randomly. The latter is strictly a polycrystalline solid."},
{id:72,topic:"2.5",term:"Amorphous solid",keys:["atoms","quite randomly","no long range order"],def:"A truly amorphous solid would have atoms arranged quite randomly. In practice we include solids such as glass or brick in which there is no long range order in the way atoms are arranged."},
{id:73,topic:"2.5",term:"Polymeric solid",keys:["chain-like molecules"],def:"A polymeric solid is a solid which is made up of chain-like molecules."},
{id:74,topic:"2.5",term:"Ductile material",keys:["drawn out","wire","plastic strain","enough stress"],def:"A ductile material is a material which can be drawn out into a wire. This implies that plastic strain occurs under enough stress."},
{id:75,topic:"2.5",term:"Elastic strain",keys:["disappears","stress is removed","original size","shape"],def:"Elastic strain is strain that disappears when the stress is removed, that is the specimen returns to its original size and shape."},
{id:76,topic:"2.5",term:"Plastic strain",keys:["decreases only slightly","stress is removed","movement","dislocations"],def:"Plastic strain is strain that decreases only slightly when the stress is removed. In a metal it arises from the movement of dislocations within the crystal structure."},
{id:77,topic:"2.5",term:"Elastic limit",keys:["deformation","ceases","elastic","maximum"],def:"The elastic limit is the point at which deformation ceases to be elastic. For a specimen it is usually measured by the maximum force, and for a material by the maximum stress, before the strain ceases to be elastic."},
{id:78,topic:"2.5",term:"Dislocations",keys:["faults","crystals","reduce","stress","planes","slide"],def:"Dislocations are certain faults in crystals which, if there are not too many, reduce the stress needed for planes of atoms to slide."},
{id:79,topic:"2.5",term:"Grain boundaries",keys:["boundaries","crystals","grains","polycrystalline"],def:"Grain boundaries are the boundaries between crystals (grains) in a polycrystalline material."},
{id:80,topic:"2.5",term:"Ductile fracture",keys:["characteristic","ductile","local thinning","increases the stress"],def:"Ductile fracture (necking) is the characteristic fracture process in a ductile material. The fracture of a rod or wire is preceded by local thinning which increases the stress."},
{id:81,topic:"2.5",term:"Brittle material",keys:["no region","plastic flow","tension","brittle fracture"],def:"A brittle material is a material with no region of plastic flow, which under tension fails by brittle fracture."},
{id:82,topic:"2.5",term:"Brittle fracture",keys:["fracture under tension","brittle","crack propagation"],def:"Brittle fracture is the fracture under tension of brittle materials by means of crack propagation."},
{id:83,topic:"2.5",term:"Elastic hysteresis",keys:["stress-strain graphs","increasing","decreasing","do not coincide","loop"],def:"Elastic hysteresis is when a material such as rubber is put under stress and the stress is then relaxed, the stress-strain graphs for increasing and decreasing stress do not coincide but form a loop."},

// ═══ 2.6 FIELDS ═══
{id:84,topic:"2.6",term:"Newton's law of gravitation",keys:["gravitational force","two particles","proportional","product","masses","inversely proportional","separation squared"],def:"The gravitational force between two particles is proportional to the product of their masses and inversely proportional to their separation squared."},
{id:85,topic:"2.6",term:"Coulomb's law",keys:["electrostatic force","two small bodies","proportional","product","charges","inversely proportional","separation squared"],def:"The electrostatic force between two small bodies is proportional to the product of their charges and inversely proportional to their separation squared."},
{id:86,topic:"2.6",term:"Electric field strength",keys:["force experienced","per unit charge","small positive charge"],def:"Electric field strength is the force experienced per unit charge by a small positive charge placed in the field."},
{id:87,topic:"2.6",term:"Gravitational field strength",keys:["force experienced","per unit mass","mass placed"],def:"Gravitational field strength is the force experienced per unit mass by a mass placed in the field."},
{id:88,topic:"2.6",term:"Electric potential",keys:["work done","per unit charge","positive charge","infinity","point"],def:"Electric potential at a point is the work done per unit charge in bringing a positive charge from infinity to that point."},
{id:89,topic:"2.6",term:"Gravitational potential",keys:["work done","per unit mass","mass","infinity","point"],def:"Gravitational potential at a point is the work done per unit mass in bringing a mass from infinity to that point."},

// ═══ 2.7 STARS ═══
{id:90,topic:"2.7",term:"Black body",keys:["absorbs","all","electromagnetic radiation","falls","no body","better emitter"],def:"A black body is a body or surface which absorbs all the electromagnetic radiation that falls upon it. No body is a better emitter of radiation at any wavelength than a black body at the same temperature."},
{id:91,topic:"2.7",term:"Wien's displacement law",keys:["wavelength","peak emission","black body","inversely proportional","absolute","kelvin temperature"],def:"The wavelength of peak emission from a black body is inversely proportional to the absolute (kelvin) temperature of the body."},
{id:92,topic:"2.7",term:"Absolute temperature",keys:["kelvin","related","celsius","273","energy","lowest"],def:"The temperature in kelvin is related to the temperature in celsius by T/K equals θ/°C plus 273.15. At 0 K the energy of particles in a body is the lowest it can possibly be."},
{id:93,topic:"2.7",term:"Stefan's law",keys:["total","electromagnetic radiation energy","emitted per unit time","black body","surface area","fourth power","Stefan constant"],def:"The total electromagnetic radiation energy emitted per unit time by a black body is given by power equals A multiplied by sigma multiplied by T to the fourth, in which A is the body's surface area and sigma is the Stefan constant."},
{id:94,topic:"2.7",term:"Luminosity",keys:["total energy","emits","per unit time","electromagnetic radiation"],def:"The luminosity of a star is the total energy it emits per unit time in the form of electromagnetic radiation."},
{id:95,topic:"2.7",term:"Intensity",keys:["radiation","distance","power","four pi","R squared"],def:"The intensity of radiation at a distance R from a source is given by the power divided by four pi R squared."},

// ═══ 2.8 COSMOLOGY ═══
{id:96,topic:"2.8",term:"Kepler's first law",keys:["each planet","ellipse","Sun","one focus"],def:"Each planet moves in an ellipse with the Sun at one focus."},
{id:97,topic:"2.8",term:"Kepler's second law",keys:["line","planet","centre","Sun","equal areas","equal times"],def:"The line joining a planet to the centre of the Sun sweeps out equal areas in equal times."},
{id:98,topic:"2.8",term:"Kepler's third law",keys:["square","period","proportional","semi-major axis","cubed"],def:"T squared, the square of the period of the planet's motion, is proportional to r cubed, in which r is the semi-major axis of its ellipse."},
{id:99,topic:"2.8",term:"Dark matter",keys:["cannot see","detect","radiation","gravitational effects"],def:"Dark matter is matter which we cannot see or detect by any sort of radiation, but whose existence we infer from its gravitational effects."},
{id:100,topic:"2.8",term:"Radial velocity of a star",keys:["component","star's velocity","line","observer on the Earth"],def:"The radial velocity of a star is the component of a star's velocity along the line joining it and an observer on the Earth."},
{id:101,topic:"2.8",term:"Galactic radial velocity",keys:["mean component","galaxy's velocity","line","observer on Earth"],def:"The galactic radial velocity is the mean component of a galaxy's velocity along the line joining it and an observer on Earth."},

// ═══ 3.1 NATURE OF WAVES ═══
{id:102,topic:"3.1",term:"Progressive wave",keys:["pattern","disturbances","medium","carrying energy","oscillating","equilibrium"],def:"A progressive wave is a pattern of disturbances travelling through a medium and carrying energy with it, involving the particles of the medium oscillating about their equilibrium positions."},
{id:103,topic:"3.1",term:"Transverse wave",keys:["particle oscillations","right angles","direction of travel"],def:"A transverse wave is one where the particle oscillations are at right angles to the direction of travel of the wave."},
{id:104,topic:"3.1",term:"Longitudinal wave",keys:["particle oscillations","in line","parallel","direction of travel"],def:"A longitudinal wave is one where the particle oscillations are in line with the direction of travel of the wave."},
{id:105,topic:"3.1",term:"Polarised wave",keys:["transverse","oscillations","only one","right angles"],def:"A polarised wave is a transverse wave in which particle oscillations occur in only one of the directions at right angles to the direction of wave propagation."},
{id:106,topic:"3.1",term:"In phase",keys:["arriving","point","same frequency","same point","cycles","same time"],def:"Waves arriving at a point are said to be in phase if they have the same frequency and are at the same point in their cycles at the same time."},
{id:107,topic:"3.1",term:"Wavelength",keys:["minimum distance","points","oscillating in phase"],def:"The wavelength of a progressive wave is the minimum distance, measured along the direction of propagation, between two points on the wave oscillating in phase."},
{id:108,topic:"3.1",term:"Frequency of a wave",keys:["number of cycles","pass","given point","one second"],def:"The frequency of a wave is the number of cycles of a wave that pass a given point in one second."},
{id:109,topic:"3.1",term:"Speed of a wave",keys:["distance","wave profile","per unit time"],def:"The speed of a wave is the distance that the wave profile moves per unit time."},

// ═══ 3.2 WAVE PROPERTIES ═══
{id:110,topic:"3.2",term:"Diffraction",keys:["spreading out","obstacles","edges","slit","geometrical shadows"],def:"Diffraction is the spreading out of waves when they meet obstacles such as the edges of a slit. Some of the wave's energy travels into the geometrical shadows of the obstacles."},
{id:111,topic:"3.2",term:"Principle of superposition",keys:["waves","two sources","same region","total displacement","vector sum"],def:"The principle of superposition states that if waves from two sources occupy the same region, then the total displacement at any one point is the vector sum of their individual displacements at that point."},
{id:112,topic:"3.2",term:"Phase difference",keys:["difference","position","cycle","oscillation","fraction","angle"],def:"Phase difference is the difference in position of two points within a cycle of oscillation. It is given as a fraction of the cycle or as an angle, where one whole cycle is 2π or 360°."},
{id:113,topic:"3.2",term:"Coherence",keys:["constant phase difference","same frequency"],def:"Coherent waves or wave sources are those which have a constant phase difference between them, and therefore must have the same frequency."},
{id:114,topic:"3.2",term:"Stationary wave",keys:["pattern","disturbances","energy is not propagated","amplitude","zero","nodes","maxima","antinodes"],def:"A stationary wave is a pattern of disturbances in a medium in which energy is not propagated. The amplitude of particle oscillations is zero at equally-spaced nodes, rising to maxima at antinodes midway between the nodes."},

// ═══ 3.3 REFRACTION ═══
{id:115,topic:"3.3",term:"Refractive index",keys:["Snell's law","angles to the normal","passing between","medium 1","medium 2"],def:"The refractive indices n1 and n2 of two media appear in Snell's law: n1 sin θ1 equals n2 sin θ2, where θ1 and θ2 are angles to the normal for light passing between the media. The refractive index of a vacuum is fixed by convention as exactly 1."},
{id:116,topic:"3.3",term:"Snell's law",keys:["boundary","ratio","sine","angle of incidence","sine","angle of refraction","constant"],def:"At the boundary between any two given materials, the ratio of the sine of the angle of incidence to the sine of the angle of refraction is a constant."},
{id:117,topic:"3.3",term:"Critical angle",keys:["slower medium","largest angle of incidence","refraction can occur","refracted wave","90"],def:"When light approaches the boundary between two media from the slower medium, the critical angle is the largest angle of incidence for which refraction can occur. The refracted wave is then travelling at 90° to the normal."},

// ═══ 3.4 PHOTONS ═══
{id:118,topic:"3.4",term:"Photoelectric effect",keys:["light","ultraviolet","short enough wavelength","surface","electrons","emitted"],def:"The photoelectric effect is when light or ultraviolet radiation of short enough wavelength falls on a surface and electrons are emitted from the surface."},
{id:119,topic:"3.4",term:"Work function",keys:["minimum energy","remove an electron","surface"],def:"The work function of a surface is the minimum energy needed to remove an electron from the surface."},
{id:120,topic:"3.4",term:"Electron volt",keys:["energy transferred","electron","two points","potential difference","1V"],def:"The electron volt is the energy transferred when an electron moves between two points with a potential difference of 1V between them."},
{id:121,topic:"3.4",term:"Ionisation",keys:["removal","one or more","electrons","atom"],def:"Ionisation is the removal of one or more electrons from an atom."},
{id:122,topic:"3.4",term:"Ionisation energy",keys:["minimum energy","remove","electron","atom","ground state"],def:"The ionisation energy of an atom is the minimum energy needed to remove an electron from the atom in its ground state."},

// ═══ 3.5 LASERS ═══
{id:123,topic:"3.5",term:"Stimulated emission",keys:["emission","photon","excited atom","passing photon","energy gap","same frequency","phase","direction"],def:"Stimulated emission is the emission of a photon from an excited atom, triggered by a passing photon of energy equal to the energy gap between the excited state and a state of lower energy in the atom. The emitted photon has the same frequency, phase, direction of travel and polarisation direction as the passing photon."},
{id:124,topic:"3.5",term:"Population inversion",keys:["higher energy state","more heavily populated","lower energy state"],def:"A population inversion is a situation in which a higher energy state in an atomic system is more heavily populated than a lower energy state of the same system."},
{id:125,topic:"3.5",term:"Pumping",keys:["feeding energy","amplifying medium","laser","population inversion"],def:"Pumping is feeding energy into the amplifying medium of a laser to produce a population inversion."},

// ═══ 3.6 RADIOACTIVITY ═══
{id:126,topic:"3.6",term:"Alpha radiation",keys:["fast moving","helium nuclei","ejected","radioactive nuclei"],def:"Alpha radiation is fast-moving particles, helium nuclei, ejected from certain radioactive nuclei."},
{id:127,topic:"3.6",term:"Beta radiation",keys:["electrons","speeds","speed of light","ejected","radioactive nuclei"],def:"Beta radiation is electrons with speeds just less than the speed of light, ejected from certain radioactive nuclei."},
{id:128,topic:"3.6",term:"Gamma radiation",keys:["photons","high energy","high frequency","short wavelength","radioactive nuclei"],def:"Gamma radiation is photons of high energy, high frequency and short wavelength, ejected from radioactive nuclei."},
{id:129,topic:"3.6",term:"AZX notation",keys:["chemical symbol","mass number","protons","neutrons","atomic number"],def:"In AZX notation, X is the chemical symbol of the element, A the mass number (number of protons plus number of neutrons), and Z the atomic number (number of protons)."},
{id:130,topic:"3.6",term:"Half-life",keys:["time taken","radioactive nuclei","activity","one half","initial value"],def:"The half-life of a nuclide is the time taken for the number of radioactive nuclei (or the activity) to reduce to one half of the initial value."},
{id:131,topic:"3.6",term:"Activity",keys:["rate of decay","disintegrations per second","sample","radioactive nuclei"],def:"Activity is the rate of decay (number of disintegrations per second) of a sample of radioactive nuclei."},
{id:132,topic:"3.6",term:"Decay constant",keys:["constant","exponential decay law","determines","rate of decay","half-life"],def:"The decay constant is the constant which appears in the exponential decay law N equals N nought e to the minus lambda t, and determines the rate of decay. The greater lambda, the more rapid the rate of decay."},

// ═══ 3.7 PARTICLES ═══
{id:133,topic:"3.7",term:"Lepton",keys:["electrons","electron-neutrinos","analogous pairs","second","third generations"],def:"Leptons are electrons and electron-neutrinos, and analogous pairs of particles of the so-called second and third generations."},
{id:134,topic:"3.7",term:"Hadron",keys:["particles","quarks","antiquarks","bound","strong force"],def:"Hadrons are particles consisting of quarks or antiquarks bound together. Only hadrons (and quarks or antiquarks themselves) can feel the strong force."},
{id:135,topic:"3.7",term:"Baryon",keys:["hadron","3 quarks","3 antiquarks","nucleons","protons","neutrons"],def:"A baryon is a hadron consisting of 3 quarks or 3 antiquarks. The best known baryons are the nucleons, i.e. protons and neutrons."},
{id:136,topic:"3.7",term:"Meson",keys:["hadron","quark-antiquark pair"],def:"A meson is a hadron consisting of a quark-antiquark pair."},

// ═══ 3.8 NUCLEAR ENERGY ═══
{id:137,topic:"3.8",term:"Unified atomic mass unit",keys:["one twelfth","mass","one atom","carbon-12"],def:"The unified atomic mass unit is defined as exactly one twelfth of the mass of one atom of carbon-12."},
{id:138,topic:"3.8",term:"Binding energy",keys:["energy","supplied","dissociate","nucleus","constituent nucleons"],def:"The binding energy of a nucleus is the energy that has to be supplied in order to dissociate the nucleus into its constituent nucleons."},
{id:139,topic:"3.8",term:"Conservation of mass-energy",keys:["energy","cannot be lost","gained","transferred","mass","c squared"],def:"Energy cannot be lost or gained, only transferred from one form to another. We can measure the energy in a body by multiplying its mass by c squared."},

// ═══ 3.9 MAGNETIC FIELDS ═══
{id:140,topic:"3.9",term:"Magnetic field B",keys:["vector quantity","North pole","freely-pivoted","force","length","wire","current","perpendicular"],def:"Magnetic field B (or magnetic flux density) is a vector quantity. Its direction is that in which the North pole of a freely-pivoted magnet points. Its magnitude is defined by B equals F over I L, in which F is the force on a length L of wire carrying a current I placed perpendicular to the field."},
{id:141,topic:"3.9",term:"Hall voltage",keys:["magnetic field","conductor","current","right angles","appears","across","specimen"],def:"When a magnetic field B is applied to a conductor carrying a current I at right angles to the field direction, a Hall voltage appears across the specimen, at right angles to the B and I directions."},

// ═══ 3.10 EM INDUCTION ═══
{id:142,topic:"3.10",term:"Magnetic flux",keys:["single-turn coil","encloses","area","angle","normal","plane","cos theta"],def:"If a single-turn coil of wire encloses an area A and a magnetic field B makes an angle θ with the normal to the plane of the coil, the magnetic flux through the coil is given by Φ equals A B cos θ."},
{id:143,topic:"3.10",term:"Flux linkage",keys:["coil","N turns","flux linkage","N Phi"],def:"If a coil consists of N turns, the flux linkage is given by N multiplied by Φ."},
{id:144,topic:"3.10",term:"Faraday's law",keys:["flux linking","changing","emf","induced","rate of change","flux linkage"],def:"When the flux linking an electrical circuit is changing, an emf is induced in the circuit of magnitude equal to the rate of change of flux linkage."},
{id:145,topic:"3.10",term:"Lenz's law",keys:["direction","current","induced emf","oppose","change","flux linkage"],def:"The direction of any current resulting from an induced emf is such as to oppose the change in flux linkage that is causing the current."},

// ═══ OPTION C — PHYSICS OF SPORT ═══
{id:146,topic:"C",term:"Coefficient of restitution",keys:["ratio","relative speed after","relative speed before","collision"],def:"The coefficient of restitution is defined as the ratio of the relative speed after a collision to the relative speed before a collision."},
{id:147,topic:"C",term:"Moment of inertia",keys:["sum","mass","distance","squared","axis"],def:"The moment of inertia of a body about a given axis is defined as the sum of the mass multiplied by the distance squared from the axis for all points in the body."},
{id:148,topic:"C",term:"Angular acceleration",keys:["rate of change","angular velocity"],def:"The angular acceleration of a rotating object is defined as the rate of change of angular velocity."},
{id:149,topic:"C",term:"Torque",keys:["moment of inertia","angular acceleration","rate of change","angular momentum"],def:"The torque is defined as the product of the moment of inertia and the angular acceleration. Also, torque can be defined as the rate of change of angular momentum."},
{id:150,topic:"C",term:"Angular momentum",keys:["moment of inertia","angular velocity","product"],def:"The angular momentum of a rigid body is defined as the product of the moment of inertia and the angular velocity."},
{id:151,topic:"C",term:"Conservation of angular momentum",keys:["total angular momentum","constant","no external torque"],def:"The total angular momentum of a system remains constant provided no external torque acts on the system."},
{id:152,topic:"C",term:"Bernoulli's equation",keys:["pressure","static pressure","density","speed","half"],def:"Bernoulli's equation states that the pressure equals the static pressure minus one half multiplied by the density multiplied by the speed squared."},
{id:153,topic:"C",term:"Drag coefficient",keys:["quantity","no units","quantify","drag","resistance","air","water"],def:"The drag coefficient is a quantity that has no units, used to quantify the drag or resistance of an object in an environment such as air or water."}
];

// FORMULA DEFS — equations not on data sheet

var FORMULA_DEFS=[
  {id:200,topic:"FM",term:"Average speed",keys:["distance","time"],def:"Average speed = total distance ÷ total time. A scalar quantity with units m/s."},
  {id:201,topic:"FM",term:"Average velocity",keys:["displacement","time"],def:"Average velocity = total displacement ÷ total time. A vector with units m/s."},
  {id:202,topic:"FM",term:"Average acceleration",keys:["v","u","t"],def:"Average acceleration = (v − u) ÷ t. Change in velocity per unit time, units m/s²."},
  {id:203,topic:"FM",term:"Weight formula",keys:["mass","g"],def:"W = mg. Weight equals mass multiplied by gravitational field strength (9.81 N/kg near Earth's surface)."},
  {id:204,topic:"FM",term:"Moment (perpendicular force)",keys:["force","distance"],def:"Moment = F × d. Force multiplied by the perpendicular distance from the pivot to the line of action of the force."},
  {id:205,topic:"FM",term:"Moment (angled force)",keys:["cos","theta"],def:"Moment = F × x × cosθ. Where x is the distance from pivot and θ is the angle between the force and the line joining force to pivot."},
  {id:206,topic:"FM",term:"Resultant force (momentum form)",keys:["momentum","time"],def:"F = Δp ÷ Δt. Resultant force equals the rate of change of momentum. This is Newton's second law in its most general form."},
  {id:207,topic:"FM",term:"Pressure",keys:["force","area"],def:"p = F ÷ A. Pressure equals force divided by the area over which it acts. Units: Pascals (Pa) = N/m²."},
  {id:208,topic:"FM",term:"Resistance in series",keys:["R1","R2","sum"],def:"R_series = R₁ + R₂ + R₃ + ... Total resistance in a series circuit is the sum of individual resistances."},
  {id:209,topic:"FM",term:"Resistance in parallel",keys:["reciprocal","1/R"],def:"1/R_parallel = 1/R₁ + 1/R₂ + 1/R₃. Take the sum of reciprocals then take the reciprocal of the result."},
  {id:210,topic:"FM",term:"Electrical energy",keys:["current","voltage","time"],def:"W = IVt. Electrical energy equals current multiplied by voltage multiplied by time. Units: Joules."},
  {id:211,topic:"FM",term:"Intensity",keys:["power","area"],def:"I = P ÷ A. Intensity equals power per unit area. Units: W/m². Applies to waves and radiation."},
  {id:212,topic:"FM",term:"Inverse square law (intensity)",keys:["4πr²","distance"],def:"I = P ÷ (4πr²). For a point source radiating equally in all directions, intensity falls off with the square of the distance."},
  {id:213,topic:"FM",term:"Photon energy (frequency form)",keys:["h","f","Planck"],def:"E = hf. Photon energy equals Planck's constant multiplied by frequency. h = 6.63 × 10⁻³⁴ J·s."},
  {id:214,topic:"FM",term:"Photon energy (wavelength form)",keys:["h","c","lambda"],def:"E = hc ÷ λ. Photon energy equals Planck's constant multiplied by speed of light divided by wavelength."},
  {id:215,topic:"FM",term:"Photon emission from atom",keys:["E2","E1","energy levels"],def:"hf = E₂ − E₁. The frequency of an emitted photon equals the energy difference between levels divided by Planck's constant."},
  {id:216,topic:"FM",term:"Hooke's law (SHM form)",keys:["k","x","restoring"],def:"F = −kx. The restoring force is proportional to and opposite to the displacement. The negative sign indicates the restoring direction."},
  {id:217,topic:"FM",term:"Small angle approximation",keys:["sinθ","θ","radians"],def:"For small angles in radians: sinθ ≈ θ ≈ tanθ. Valid to within 1% for θ < 0.24 radians (about 14°)."},
  {id:218,topic:"FM",term:"Mean kinetic energy of a particle",keys:["kT","temperature"],def:"½mc² = 3/2 kT. Mean kinetic energy of a gas particle equals 3/2 multiplied by Boltzmann's constant and absolute temperature."},
  {id:219,topic:"FM",term:"RMS speed",keys:["root mean square","c²"],def:"c_rms = √(c̄²). Root mean square speed is the square root of the mean of the squares of all particle speeds."},
  {id:220,topic:"FM",term:"Capacitance in series",keys:["1/C","reciprocal"],def:"1/C_series = 1/C₁ + 1/C₂ + 1/C₃. Total capacitance in series is always less than the smallest individual capacitor."},
  {id:221,topic:"FM",term:"Capacitance in parallel",keys:["sum","C1+C2"],def:"C_parallel = C₁ + C₂ + C₃. Total capacitance in parallel is the sum of all individual capacitances."},
  {id:222,topic:"FM",term:"Time constant",keys:["RC","tau"],def:"τ = RC. The time constant of an RC circuit equals resistance multiplied by capacitance. After time τ, charge falls to 37% of initial value."},
  {id:223,topic:"FM",term:"Capacitor half-life",keys:["RC","ln2","discharge"],def:"t½ = RC × ln2. The time for a capacitor to discharge to half its initial charge. Equal to 0.693 × RC."},
  {id:224,topic:"FM",term:"Gravitational field strength definition",keys:["force","mass","g=F/m"],def:"g = F ÷ m. Gravitational field strength is the force per unit mass experienced by a test mass placed at that point."},
  {id:225,topic:"FM",term:"Electric field strength definition",keys:["force","charge","E=F/Q"],def:"E = F ÷ Q. Electric field strength is the force per unit positive charge experienced by a test charge placed at that point."},
  {id:226,topic:"FM",term:"Electric field and potential gradient",keys:["gradient","potential","V"],def:"E = −(gradient of V_E). Electric field strength equals the negative of the gradient of the electric potential. The field points from high to low potential."},
  {id:227,topic:"FM",term:"Gravitational field and potential gradient",keys:["gradient","V_G"],def:"g = −(gradient of V_G). Gravitational field strength equals the negative of the gradient of the gravitational potential."},
  {id:228,topic:"FM",term:"Faraday's law",keys:["flux","N","rate"],def:"ε = −ΔNΦ ÷ Δt. The induced EMF equals minus the rate of change of flux linkage (NΦ). The negative sign indicates Lenz's law."},
  {id:229,topic:"FM",term:"Motional EMF",keys:["B","l","v","conductor"],def:"ε = Blv. EMF induced in a straight conductor of length l moving with velocity v perpendicular to a magnetic field B."},
  {id:230,topic:"FM",term:"Power in terms of velocity",keys:["F","v","direction"],def:"P = Fv. Power equals force multiplied by velocity when the velocity is in the direction of the force. P = Fvcosθ for angled forces."},
  {id:231,topic:"FM",term:"Wave speed from period",keys:["lambda","T","period"],def:"v = λ ÷ T. Wave speed equals wavelength divided by period. Equivalent to v = fλ since f = 1/T."},
];

var MATHS_DEFS=[
  // Algebra & Series
  {id:300,topic:"MA",term:"Quadratic formula",keys:["b²-4ac","discriminant"],def:"x = (−b ± √(b²−4ac)) ÷ 2a. Solves ax² + bx + c = 0. The discriminant b²−4ac determines the number of real roots."},
  {id:301,topic:"MA",term:"Arithmetic series sum",keys:["a","d","n"],def:"Sₙ = n/2 × (2a + (n−1)d). Sum of n terms of arithmetic series with first term a and common difference d. Also written Sₙ = n/2(a + l) where l is the last term."},
  {id:302,topic:"MA",term:"Geometric series sum",keys:["r","ratio"],def:"Sₙ = a(1 − rⁿ) ÷ (1 − r). Sum of n terms with first term a and common ratio r. Valid for r ≠ 1."},
  {id:303,topic:"MA",term:"Sum to infinity (geometric)",keys:["convergent","|r|<1"],def:"S∞ = a ÷ (1 − r). Valid only when |r| < 1 (converging series). As n → ∞, the sum approaches this finite value."},
  {id:304,topic:"MA",term:"Binomial expansion (general)",keys:["nCr","coefficients"],def:"(a + b)ⁿ = Σ ⁿCᵣ aⁿ⁻ʳ bʳ. The coefficient of each term is ⁿCᵣ = n! ÷ (r!(n−r)!). Valid for all positive integer n."},
  {id:305,topic:"MA",term:"Binomial expansion (1+x)ⁿ",keys:["fractional","negative","|x|<1"],def:"(1+x)ⁿ = 1 + nx + n(n−1)x²/2! + n(n−1)(n−2)x³/3! + ... Valid for |x| < 1 when n is fractional or negative."},
  // Trigonometry
  {id:306,topic:"MT",term:"Pythagorean identity",keys:["sin²","cos²","1"],def:"sin²θ + cos²θ = 1. Fundamental trig identity derived from Pythagoras. Can be rearranged: sin²θ = 1 − cos²θ."},
  {id:307,topic:"MT",term:"Secant identity",keys:["sec","tan","1+tan²"],def:"sec²θ = 1 + tan²θ. Derived by dividing the Pythagorean identity by cos²θ. Useful for integration and differentiation."},
  {id:308,topic:"MT",term:"Cosecant identity",keys:["cosec","cot","1+cot²"],def:"cosec²θ = 1 + cot²θ. Derived by dividing the Pythagorean identity by sin²θ."},
  {id:309,topic:"MT",term:"sin(A + B)",keys:["sinAcosB","cosAsinB"],def:"sin(A + B) = sinA cosB + cosA sinB. The sine of a sum. For sin(A − B), change the + to −."},
  {id:310,topic:"MT",term:"cos(A + B)",keys:["cosAcosB","sinAsinB"],def:"cos(A + B) = cosA cosB − sinA sinB. The cosine of a sum. For cos(A − B), change − to +."},
  {id:311,topic:"MT",term:"tan(A + B)",keys:["tanA+tanB","1−tanAtanB"],def:"tan(A + B) = (tanA + tanB) ÷ (1 − tanA tanB). For tan(A − B), change both signs."},
  {id:312,topic:"MT",term:"Double angle sin",keys:["2sinAcosA","2θ"],def:"sin2A = 2 sinA cosA. Derived from sin(A+A). Used to simplify expressions and in integration."},
  {id:313,topic:"MT",term:"Double angle cos",keys:["cos²","sin²","2cos²-1"],def:"cos2A = cos²A − sin²A = 2cos²A − 1 = 1 − 2sin²A. Three equivalent forms, all useful in different contexts."},
  {id:314,topic:"MT",term:"Double angle tan",keys:["2tanA","1-tan²A"],def:"tan2A = 2tanA ÷ (1 − tan²A). Derived from tan(A+A)."},
  // Calculus
  {id:315,topic:"MC",term:"Derivative of aˣ",keys:["ln a","exponential"],def:"d/dx(aˣ) = aˣ ln a. For a = e this gives d/dx(eˣ) = eˣ since ln e = 1."},
  {id:316,topic:"MC",term:"Derivative of ln x",keys:["1/x","natural log"],def:"d/dx(ln x) = 1/x. For x > 0. Equivalent to d/dx(log_e x) = 1/x."},
  {id:317,topic:"MC",term:"Integration by parts",keys:["uv","v du/dx"],def:"∫u(dv/dx)dx = uv − ∫v(du/dx)dx. Choose u to differentiate and dv/dx to integrate. LIATE rule: try Log, Inverse trig, Algebraic, Trig, Exponential as u."},
  {id:318,topic:"MC",term:"Trapezium rule",keys:["h/2","y0","yn","numerical"],def:"∫y dx ≈ h/2 × (y₀ + 2y₁ + 2y₂ + ... + 2yₙ₋₁ + yₙ). Where h = (b−a)/n. First and last ordinates once, all others twice."},
  {id:319,topic:"MC",term:"Chain rule",keys:["dy/du","du/dx","composite"],def:"dy/dx = (dy/du) × (du/dx). For composite functions y = f(g(x)). Differentiate the outer function, multiply by derivative of the inner."},
  {id:320,topic:"MC",term:"Product rule",keys:["uv'","vu'","two functions"],def:"d/dx(uv) = u(dv/dx) + v(du/dx). For the product of two functions. Can be remembered as 'first times derivative of second plus second times derivative of first'."},
  {id:321,topic:"MC",term:"Quotient rule",keys:["vu'-uv'","v²","fraction"],def:"d/dx(u/v) = (v(du/dx) − u(dv/dx)) ÷ v². For a fraction of two functions. Low d-high minus high d-low, over low squared."},
  // Vectors & Proof
  {id:322,topic:"MV",term:"Vector magnitude",keys:["|AB|","components","Pythagoras"],def:"|AB| = √(x² + y² + z²). The magnitude (length) of a vector with components (x, y, z). Extend Pythagoras to 3D."},
  {id:323,topic:"MV",term:"Scalar product (dot product)",keys:["a·b","cosθ","components"],def:"a·b = |a||b|cosθ = a₁b₁ + a₂b₂ + a₃b₃. Two equivalent forms. If a·b = 0 the vectors are perpendicular."},
  // Statistics
  {id:324,topic:"MS",term:"Normal distribution standardising",keys:["Z","mu","sigma","standard"],def:"Z = (X − μ) ÷ σ. To standardise a normal distribution X~N(μ,σ²), subtract the mean and divide by standard deviation to get Z~N(0,1)."},
  {id:325,topic:"MS",term:"Binomial distribution mean",keys:["np","expectation"],def:"E(X) = np. For X~B(n,p), the mean (expected value) equals n multiplied by p. Variance = np(1−p)."},
];
